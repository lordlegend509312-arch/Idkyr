<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Proposal</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;

background:
linear-gradient(rgba(255,120,170,0.35),rgba(255,120,170,0.35)),
url("wallpaper1.jpg") center/cover no-repeat fixed;

overflow:hidden;
}

.heart{
position:fixed;
font-size:26px;
animation:floatUp 10s linear forwards;
pointer-events:none;
opacity:0.85;
}

@keyframes floatUp{
from{
transform:translateY(100vh) scale(0.7);
opacity:0;
}
to{
transform:translateY(-120vh) scale(1.4);
opacity:1;
}
}

.page{
width:90%;
max-width:420px;
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

.box{
width:100%;
padding:30px 22px;
border-radius:25px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(15px);
box-shadow:0 10px 30px rgba(255,0,102,0.25),inset 0 0 10px rgba(255,255,255,0.6);
text-align:center;
transition:0.3s;
}

.box:hover{
transform:translateY(-4px);
}

.box h2,.box h3{
font-family:'Dancing Script',cursive;
color:#ff0066;
font-size:30px;
text-shadow:0 0 8px rgba(255,0,102,0.35);
}

.input-container{
position:relative;
margin-top:18px;
}

input{
width:100%;
padding:12px 40px 12px 12px;
border-radius:14px;
border:2px solid #ff8ab6;
font-size:15px;
outline:none;
background:rgba(255,255,255,0.85);
transition:.25s;
}

input:focus{
border-color:#ff2e7a;
box-shadow:0 0 10px rgba(255,46,122,0.3);
}

.toggle-eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
display:flex;
align-items:center;
}

.toggle-eye svg{
width:22px;
height:22px;
stroke:#ff2e7a;
transition:.2s;
}

.toggle-eye:hover svg{
transform:scale(1.1);
}

button{
margin-top:15px;
padding:11px 22px;
border:none;
border-radius:14px;
font-size:15px;
cursor:pointer;
background:linear-gradient(45deg,#ff4d94,#ff1a66);
color:white;
transition:.25s;
}

button.active{
background:linear-gradient(135deg,#ff0066,#ff1a66,#ff4d94);
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(255,0,100,0.3);
}

#hintSection{
display:none;
}

#hintText,#hintBox{
display:none;
margin-top:15px;
color:#d6005c;
font-weight:500;
}

.revealed-letter{
margin-top:8px;
font-size:20px;
font-weight:bold;
color:#b30059;
transition:.3s;
}

.fade-in{
animation:fadeIn 0.6s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="page">

<div id="passwordDiv" class="box">

<h2>Enter Secret Code</h2>

<div class="input-container">

<input type="password" id="passInput">

<span class="toggle-eye" onclick="togglePassword(event)">

<svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
</svg>

<svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" style="display:none">
<path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.94 10.94 0 0112 20C5 20 1 12 1 12"/>
<line x1="1" y1="1" x2="23" y2="23"/>
</svg>

</span>

</div>

<button id="submitBtn" onclick="checkPassword()">Submit</button>

</div>

<div id="hintSection" class="box">

<h3 id="hintHeader">Hint k liye kissiii do pehle huhh</h3>

<div class="input-container">

<input type="text" id="hintInput">

<button id="hintBtn" onclick="displayHint()">Give</button>

</div>

<div id="hintText"></div>

<div id="hintBox"></div>

</div>

</div>

<script>

setInterval(()=>{
if(document.querySelectorAll(".heart").length>30) return;

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(heart);
setTimeout(()=>heart.remove(),10000);

},900);

const password="NEETWALIMADAM";

const passInput=document.getElementById('passInput');
const hintInput=document.getElementById('hintInput');
const hintHeader=document.getElementById('hintHeader');
const hintText=document.getElementById('hintText');
const hintBox=document.getElementById('hintBox');
const submitBtn=document.getElementById('submitBtn');
const hintBtn=document.getElementById('hintBtn');

let wrongAttempts=0;
let thirdStep=0;

const thirdLines=[
"Yrrr pighalo mt 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭uhmm yelo",
"Oye kya krri ho ye bola na mt pighlaooo 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"yrrr pighal gya firse lelo hint 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"Oye sharam aari hai bohot zadaa kya krri hoo ye 😭😭😭😭😭😭😭😭😭😭😭😭😡😡😡😡😡😭😭😭😭😭😭😭😭😭😭😭😭😭",
"Baby no gandii baat🥺🥺🥺😭😭😭😭😭😭😭",
"Code type krte krte hi sharam aari h 😭🙈😭😭😭😭😭😭😭😭😭😭😭🙈🙈🙈😭",
"Oye ab bohot hora h aise hi krte krte pura password nikalwa login hainaa 🙄🥺🥺😭😭",
"oyee bol rhaaa hu maanjaooo kyaaa haii huhh huhh 🙈😡😡😡😡😭😭",
"Gandiii😭😭😭😭😭🙈🙈🥳🥳",
"NOOOOOO😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"DED 😭😭😭😭😭😭😭😭😭😭😭😭😭",
"MAI HAAR MAANTA HOON 😭😭💋🛐😭😭😭"
];

function togglePassword(event){
event.preventDefault();

const open=document.getElementById("eyeOpen");
const closed=document.getElementById("eyeClosed");

if(passInput.type==="password"){
passInput.type="text";
open.style.display="block";
closed.style.display="none";
}else{
passInput.type="password";
open.style.display="none";
closed.style.display="block";
}

passInput.blur();
}

passInput.addEventListener("input",()=>{
submitBtn.classList.toggle("active",passInput.value.trim()!=="");
});

hintInput.addEventListener("input",()=>{
hintBtn.classList.toggle("active",hintInput.value.trim()!=="");
});

passInput.addEventListener("keypress",e=>{
if(e.key==="Enter") checkPassword();
});

hintInput.addEventListener("keypress",e=>{
if(e.key==="Enter") displayHint();
});

function checkPassword(){

if(passInput.value.trim()==="") return;

if(passInput.value===password){
window.location.href="yesorno.html";
return;
}

wrongAttempts++;

document.getElementById('hintSection').style.display='block';

hintInput.value="";
hintText.style.display='none';
hintBox.style.display='none';

if(wrongAttempts===1)
hintHeader.textContent="Hint k liye kissiii do pehle huhh";
else if(wrongAttempts===2)
hintHeader.textContent="Ab 2nd hint ke liye kam se kam 30+ kisses chahiye huhh 🥺🥺😈";
else
hintHeader.textContent="Firse galat..ab nhi milegi koi hint vint huhh ";

passInput.value="";
submitBtn.classList.remove("active");
}

function displayHint(){

if(wrongAttempts===0) return;

const kissCount=(hintInput.value.match(/💋/g)||[]).length;

if(wrongAttempts===1 && kissCount>=1){

hintText.style.display='block';
hintBox.style.display='block';

hintText.textContent="Kya mujhe hint deni chahiye...uhmm...sochne do btau ya nhi 🤔...chalo bta hi deta hu huhhh";
hintBox.textContent="First nickname";

}
else if(wrongAttempts===2 && kissCount>=30){

hintText.style.display='block';
hintBox.style.display='block';

hintText.textContent="Kya mujhe hint deni chahiye...uhmm...sochne do btau ya nhi 🤔...chalo bta hi deta hu huhhh";
hintBox.textContent="Password capital letters me hai huhh";

}
else if(wrongAttempts>=3 && kissCount>=1 && thirdStep<thirdLines.length){

hintText.style.display='none';

hintBox.style.display='block';
hintBox.classList.add("fade-in");

const letter=password[thirdStep];

hintBox.innerHTML=thirdLines[thirdStep] +
"<div class='revealed-letter'>Letter: "+letter+"</div>";

thirdStep++;

if(thirdStep===password.length){
hintBox.innerHTML=thirdLines[thirdStep-1] +
"<div class='revealed-letter'>NEETWALIMADAM</div>";
}

}

hintInput.value="";
}

</script>

<script>

</script>

</body>
</html>
