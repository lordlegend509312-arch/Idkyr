<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Proposal</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  background:
    linear-gradient(rgba(255,120,170,0.35),rgba(255,120,170,0.35)),
    url("wallpaper1.jpg") center/cover no-repeat fixed;
  overflow:hidden;
}

/* Hearts */
.heart{
  position:fixed;
  font-size:26px;
  animation:floatUp 10s linear forwards;
  pointer-events:none;
  opacity:0.85;
}

@keyframes floatUp{
  from{ transform:translateY(100vh) scale(0.7); opacity:0; }
  to{   transform:translateY(-120vh) scale(1.4); opacity:1; }
}

.page{
  width:90%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
}

.box{
  width:100%;
  padding:30px 22px;
  border-radius:25px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(255,0,102,0.25),inset 0 0 10px rgba(255,255,255,0.6);
  text-align:center;
  transition:0.3s;
}

.box:hover{ transform:translateY(-4px); }

.box h2, .box h3{
  font-family:'Dancing Script',cursive;
  color:#ff0066;
  font-size:30px;
  text-shadow:0 0 8px rgba(255,0,102,0.35);
}

.input-container{
  position:relative;
  margin-top:18px;
}

input{
  width:100%;
  padding:12px 40px 12px 12px;
  border-radius:14px;
  border:2px solid #ff8ab6;
  font-size:15px;
  outline:none;
  background:rgba(255,255,255,0.85);
  transition:.25s;
}

input:focus{
  border-color:#ff2e7a;
  box-shadow:0 0 10px rgba(255,46,122,0.3);
}

.toggle-eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  display:flex;
  align-items:center;
}

.toggle-eye svg{
  width:22px;
  height:22px;
  stroke:#ff2e7a;
  transition:.2s;
}

.toggle-eye:hover svg{ transform:scale(1.1); }

button{
  margin-top:15px;
  padding:11px 22px;
  border:none;
  border-radius:14px;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(45deg,#ff4d94,#ff1a66);
  color:white;
  transition:.25s;
}

button.active{
  background:linear-gradient(135deg,#ff0066,#ff1a66,#ff4d94);
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(255,0,100,0.3);
}

#hintSection{ display:none; }

#hintText, #hintBox{
  display:none;
  margin-top:15px;
  color:#d6005c;
  font-weight:500;
}

/* FIX #5 — hint button properly spaced */
.hint-row{
  display:flex;
  gap:8px;
  margin-top:18px;
  align-items:center;
}

.hint-row input{
  flex:1;
  margin:0;
  padding:12px;
}

.hint-row button{
  margin:0;
  padding:11px 18px;
  flex-shrink:0;
}

.revealed-letter{
  margin-top:8px;
  font-size:20px;
  font-weight:bold;
  color:#b30059;
  transition:.3s;
}

.fade-in{ animation:fadeIn 0.6s ease forwards; }

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* Wrong password shake */
@keyframes shake{
  0%,100%{ transform:translateX(0); }
  20%{ transform:translateX(-8px); }
  40%{ transform:translateX(8px); }
  60%{ transform:translateX(-5px); }
  80%{ transform:translateX(5px); }
}
.shake{ animation:shake 0.4s ease; }

/* Password box glow pulse after hint */
@keyframes glowPulse{
  0%,100%{ box-shadow:0 10px 30px rgba(255,0,102,0.25),inset 0 0 10px rgba(255,255,255,0.6); }
  50%{ box-shadow:0 0 30px rgba(255,0,102,0.9),0 0 60px rgba(255,0,102,0.5),inset 0 0 10px rgba(255,255,255,0.6); }
}
.glow-pulse{
  animation:glowPulse 1s ease-in-out infinite;
}

/* Hint button disabled state */
#hintBtn:disabled{
  background:linear-gradient(45deg,#ccc,#aaa);
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="page">

  <!-- Password Box -->
  <div id="passwordDiv" class="box">

    <h2>Enter Secret Code</h2>

    <div class="input-container">

      <input type="password" id="passInput" placeholder="Type here...">

      <!-- FIX #1 — eye toggle logic fixed -->
      <span class="toggle-eye" onclick="togglePassword(event)">
        <!-- eyeOpen = password hidden, show this when text is hidden -->
        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <!-- eyeClosed = show when password is visible -->
        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" style="display:none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.94 10.94 0 0112 20C5 20 1 12 1 12"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </span>

    </div>

    <button id="submitBtn" onclick="checkPassword()">Submit</button>

  </div>

  <!-- Hint Box -->
  <div id="hintSection" class="box" style="display:none">

    <h3 id="hintHeader">Hint k liye kissiii do pehle huhh</h3>

    <!-- FIX #5 — button outside input-container, flex row -->
    <div class="hint-row">
      <input type="text" id="hintInput" placeholder="">
      <button id="hintBtn" onclick="displayHint()">Give</button>
    </div>

    <!-- FIX #3 — no hint attempted message -->
    <div id="noAttemptMsg" style="display:none;margin-top:12px;color:#d6005c;font-weight:500;">
      Pehle password try toh karo 🙄
    </div>

    <div id="hintText"></div>
    <div id="hintBox"></div>

  </div>

</div>

<script>

  /* ── Hearts ── */
  setInterval(() => {
    if (document.querySelectorAll(".heart").length > 30) return;
    const heart       = document.createElement("div");
    heart.className   = "heart";
    heart.innerHTML   = "💖";
    heart.style.left  = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 10000);
  }, 900);

  /* ── FIX #6 — password hashed, not plain text ── */
  // SHA-256 of "NEETWALIMADAM"
  const correctHash = "e44e0638e2eb983da17c5a9c16e6c2df3e50bdb4ddf62ad59e3adfb6ff9bad91";

  async function hashInput(str) {
    const buf  = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  const passInput  = document.getElementById("passInput");
  const hintInput  = document.getElementById("hintInput");
  const hintHeader = document.getElementById("hintHeader");
  const hintText   = document.getElementById("hintText");
  const hintBox    = document.getElementById("hintBox");
  const submitBtn  = document.getElementById("submitBtn");
  const hintBtn    = document.getElementById("hintBtn");
  const noAttempt  = document.getElementById("noAttemptMsg");

  let wrongAttempts  = 0;  // total wrong passwords entered
  let hintsTaken     = 0;  // hints actually given (controls hint level)
  let thirdStep      = 0;
  let hintJustGiven  = false; // true after hint given, resets after next wrong password

  const thirdLines = [
    "Yrrr pighalo mt 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭uhmm yelo",
    "Oye kya krri ho ye bola na mt pighlaooo 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
    "yrrr pighal gya firse lelo hint 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
    "Oye sharam aari hai bohot zadaa kya krri hoo ye 😭😭😭😭😭😭😭😭😭😭😭😭😡😡😡😡😡😭😭😭😭😭😭😭😭😭😭😭😭😭",
    "Baby no gandii baat🥺🥺🥺😭😭😭😭😭😭😭",
    "Code type krte krte hi sharam aari h 😭🙈😭😭😭😭😭😭😭😭😭😭😭🙈🙈🙈😭",
    "Oye ab bohot hora h aise hi krte krte pura password nikalwa login hainaa 🙄🥺🥺😭😭",
    "oyee bol rhaaa hu maanjaooo kyaaa haii huhh huhh 🙈😡😡😡😡😭😭",
    "Gandiii😭😭😭😭😭🙈🙈🥳🥳",
    "NOOOOOO😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
    "😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
    "DED 😭😭😭😭😭😭😭😭😭😭😭😭😭",
    "MAI HAAR MAANTA HOON 😭😭💋🛐😭😭😭"
  ];

  /* ── FIX #1 — eye toggle fixed ── */
  function togglePassword(event) {
    event.preventDefault();
    const open   = document.getElementById("eyeOpen");
    const closed = document.getElementById("eyeClosed");

    if (passInput.type === "password") {
      passInput.type       = "text";
      open.style.display   = "none";   // hide open eye (now visible)
      closed.style.display = "block";  // show closed eye (to hide again)
    } else {
      passInput.type       = "password";
      open.style.display   = "block";  // show open eye (password hidden)
      closed.style.display = "none";
    }
    passInput.focus();
  }

  passInput.addEventListener("input", () => {
    submitBtn.classList.toggle("active", passInput.value.trim() !== "");
  });

  hintInput.addEventListener("input", () => {
    hintBtn.classList.toggle("active", hintInput.value.trim() !== "");
  });

  passInput.addEventListener("keypress", e => {
    if (e.key === "Enter") checkPassword();
  });

  hintInput.addEventListener("keypress", e => {
    if (e.key === "Enter") displayHint();
  });

  /* ── Check Password ── */
  async function checkPassword() {
    const val = passInput.value.trim();
    if (!val) return;

    const h = await hashInput(val);

    if (h === correctHash) {
      window.location.href = "yesorno.html";
      return;
    }

    // Wrong — shake animation
    const box = document.getElementById("passwordDiv");
    box.classList.remove("shake");
    void box.offsetWidth;
    box.classList.add("shake");
    setTimeout(() => box.classList.remove("shake"), 400);

    wrongAttempts++;
    document.getElementById("hintSection").style.display = "block";

    hintInput.value         = "";
    hintText.style.display  = "none";
    hintBox.style.display   = "none";
    noAttempt.style.display = "none";

    // Header based on hintsTaken — not wrongAttempts
    if (hintsTaken === 0)
      hintHeader.textContent = "Hint k liye kissiii do pehle huhh";
    else if (hintsTaken === 1)
      hintHeader.textContent = "Ab 2nd hint ke liye kam se kam 30+ kisses chahiye huhh 🥺🥺😈";
    else
      hintHeader.textContent = "Firse galat..ab nhi milegi koi hint vint huhh";

    passInput.value = "";
    submitBtn.classList.remove("active");

    // Reset hintJustGiven so user can get next hint
    hintJustGiven = false;
    const pwBox = document.getElementById("passwordDiv");
    pwBox.classList.remove("glow-pulse");
  }

  /* ── Display Hint ── */
  function displayHint() {

    // No password attempted yet
    if (wrongAttempts === 0) {
      noAttempt.style.display = "block";
      return;
    }

    const kissCount = (hintInput.value.match(/💋/g) || []).length;

    // ══ CASE 1: Hint already given this round ══
    // User must try password first before getting another hint
    // Show ONLY "pehle password try karo" — nothing else
    if (hintJustGiven) {
      hintText.style.display = "none";      // hide "kya mujhe hint deni chahiye" line
      hintText.textContent   = "";
      hintBox.style.display  = "block";
      hintBox.textContent    = "Pehle password try karo 🙄"; // only this line
      hintBox.innerHTML      = "Pehle password try karo 🙄"; // clear any revealed letter too
      hintInput.value        = "";
      hintBtn.classList.remove("active");
      const pwBox = document.getElementById("passwordDiv");
      pwBox.classList.remove("glow-pulse");
      void pwBox.offsetWidth;
      pwBox.classList.add("glow-pulse");
      passInput.focus();
      passInput.addEventListener("input", function stopGlow(){
        pwBox.classList.remove("glow-pulse");
        passInput.removeEventListener("input", stopGlow);
      });
      return;
    }

    // ══ CASE 2: First hint ══
    // Condition: 1+ kiss emoji
    // Met     → give hint + lock
    // Not met → do NOTHING, stay silent
    if (hintsTaken === 0) {
      if (kissCount >= 1) {
        hintsTaken++;
        hintJustGiven          = true;
        hintText.style.display = "block";
        hintBox.style.display  = "block";
        hintText.textContent   = "Kya mujhe hint deni chahiye...uhmm...sochne do btau ya nhi 🤔...chalo bta hi deta hu huhhh";
        hintBox.textContent    = "First nickname";
      }
      // else: condition not met — do nothing, no message
      hintInput.value = "";
      hintBtn.classList.remove("active");
      return;
    }

    // ══ CASE 3: Second hint ══
    // Condition: 30+ kiss emoji
    // Met     → give hint + lock
    // Not met → do NOTHING, stay silent
    if (hintsTaken === 1) {
      if (kissCount >= 30) {
        hintsTaken++;
        hintJustGiven          = true;
        hintText.style.display = "block";
        hintBox.style.display  = "block";
        hintText.textContent   = "Kya mujhe hint deni chahiye...uhmm...sochne do btau ya nhi 🤔...chalo bta hi deta hu huhhh";
        hintBox.textContent    = "Password capital letters me hai huhh";
      }
      // else: less than 30 — do nothing, no message
      hintInput.value = "";
      hintBtn.classList.remove("active");
      return;
    }

    // ══ CASE 4: Third hint onwards (letter reveal) ══
    // Condition: 1+ kiss emoji
    // Met     → reveal next letter + lock
    // Not met → do NOTHING, stay silent
    if (hintsTaken >= 2 && thirdStep < thirdLines.length) {
      if (kissCount >= 1) {
        hintsTaken++;
        hintJustGiven          = true;
        hintText.style.display = "none";
        hintBox.style.display  = "block";
        hintBox.classList.add("fade-in");
        const ch = "NEETWALIMADAM"[thirdStep] || "";
        hintBox.innerHTML = thirdLines[thirdStep] + "<div class='revealed-letter'>Letter: " + ch + "</div>";
        thirdStep++;
        if (thirdStep >= 13) {
          hintBox.innerHTML = thirdLines[12] + "<div class='revealed-letter'>NEETWALIMADAM</div>";
        }
      }
      // else: no kiss — do nothing, no message
      hintInput.value = "";
      hintBtn.classList.remove("active");
      return;
    }
  }

  /* ══════════════════════════════════════════
     SMART PRELOAD — future proof
     Koi bhi file add karo, code touch mat karo

     SIRF YEH EDIT KARO FUTURE MEIN:
     - Pages badhao toh "pages" array mein add karo
     - Baki sab automatic hai
  ══════════════════════════════════════════ */
  (function(){

    // ── 1. VIDEOS — edit1 to edit100 ──
    // Nai edits add karo, automatically detect hongi
    for (let i = 1; i <= 100; i++) {
      (function(num){
        const v   = document.createElement("video");
        v.preload = "auto";
        v.muted   = true;
        v.src     = "edit" + num + ".mp4";
        v.onerror = () => { v.src = ""; };
      })(i);
    }

    // ── 2. WALLPAPERS — wallpaper1 to wallpaper30 ──
    // Nai wallpapers add karo, automatically detect hongi
    // Har extension try hoga — jpg, jpeg, png, webp
    const imgExts = ["jpg","jpeg","png","webp"];
    for (let i = 1; i <= 30; i++) {
      imgExts.forEach(ext => {
        const img = new Image();
        img.src   = "wallpaper" + i + "." + ext;
      });
    }
    // wallpaper.jpg bhi (bina number)
    imgExts.forEach(ext => {
      const img = new Image();
      img.src   = "wallpaper." + ext;
    });

    // ── 3. MP3 FILES — common name patterns ──
    // song1.mp3, bg1.mp3, music1.mp3... sab try hoga
    // Nai mp3 add karo agar naam inn patterns mein ho toh automatic
    const audioPatterns = ["song","bg","music","audio","track","ost","bgm"];
    audioPatterns.forEach(name => {
      for (let i = 1; i <= 20; i++) {
        const a   = document.createElement("audio");
        a.preload = "auto";
        a.src     = name + i + ".mp3";
        a.onerror = () => { a.src = ""; };
      }
      // Bina number bhi (song.mp3, bg.mp3)
      const a   = document.createElement("audio");
      a.preload = "auto";
      a.src     = name + ".mp3";
      a.onerror = () => { a.src = ""; };
    });

    // ── 4. PAGES — fully automatic ──
    // love1 to love20 sab try hoga — jo bhi mile prefetch ho jaayega
    // Naya page banao bas "love" naam rakho, code touch mat karo
    for (let i = 1; i <= 20; i++) {
      (function(num){
        fetch("love" + num + ".html", { method: "HEAD" })
          .then(res => {
            if (res.ok) {
              const link = document.createElement("link");
              link.rel   = "prefetch";
              link.href  = "love" + num + ".html";
              document.head.appendChild(link);
            }
          })
          .catch(() => {});
      })(i);
    }
    // yesorno.html bhi prefetch
    const yn = document.createElement("link");
    yn.rel   = "prefetch";
    yn.href  = "yesorno.html";
    document.head.appendChild(yn);

  })();

</script>
</body>
</html>
