<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Valentine Proposal</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;

/* WALLPAPER BACKGROUND */

background:
linear-gradient(rgba(255,120,170,0.35),rgba(255,120,170,0.35)),
url("wallpaper1.jpg") center/cover no-repeat fixed;

overflow:hidden;
}

/* floating hearts */

.heart{
position:fixed;
font-size:26px;
animation:floatUp 10s linear forwards;
pointer-events:none;
opacity:0.85;
}

@keyframes floatUp{
from{
transform:translateY(100vh) scale(0.7);
opacity:0;
}
to{
transform:translateY(-120vh) scale(1.4);
opacity:1;
}
}

/* container */

.page{
width:90%;
max-width:420px;
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

/* romantic glass box */

.box{

width:100%;

padding:30px 22px;

border-radius:25px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(15px);

box-shadow:
0 10px 30px rgba(255,0,102,0.25),
inset 0 0 10px rgba(255,255,255,0.6);

text-align:center;

transition:0.3s;

}

.box:hover{
transform:translateY(-4px);
}

/* headings */

.box h2,.box h3{

font-family:'Dancing Script',cursive;

color:#ff0066;

font-size:30px;

text-shadow:0 0 8px rgba(255,0,102,0.35);

}

/* input */

.input-container{
position:relative;
margin-top:18px;
}

input{

width:100%;

padding:12px 40px 12px 12px;

border-radius:14px;

border:2px solid #ff8ab6;

font-size:15px;

outline:none;

}

input:focus{

border-color:#ff2e7a;

box-shadow:0 0 8px rgba(255,46,122,0.4);

}

.toggle-eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* button */

button{

margin-top:15px;

padding:11px 22px;

border:none;

border-radius:14px;

font-size:15px;

cursor:pointer;

background:linear-gradient(45deg,#ff4d94,#ff1a66);

color:white;

transition:0.25s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 5px 15px rgba(255,0,100,0.3);

}

#hintSection{
display:none;
}

#hintText,#hintBox{

display:none;

margin-top:15px;

color:#d6005c;

font-weight:500;

}

.revealed-letter{

margin-top:8px;

font-size:20px;

font-weight:bold;

color:#b30059;

}

</style>
</head>

<body>

<div class="page">

<div id="passwordDiv" class="box">
<h2>Enter Secret Code</h2>

<div class="input-container">
<input type="password" id="passInput">
<span class="toggle-eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="checkPassword()">Submit</button>

</div>

<div id="hintSection" class="box">

<h3 id="hintHeader">Hint k liye kissiii do pehle huhh</h3>

<div class="input-container">
<input type="text" id="hintInput">
<button onclick="displayHint()">Give</button>
</div>

<div id="hintText"></div>
<div id="hintBox"></div>

</div>

</div>

<script>

/* floating hearts */

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),10000);

/* ===== PASSWORD LOGIC SAME ===== */

const password="NEETWALIMADAM";

const passInput=document.getElementById('passInput');
const hintInput=document.getElementById('hintInput');
const hintHeader=document.getElementById('hintHeader');
const hintText=document.getElementById('hintText');
const hintBox=document.getElementById('hintBox');

let wrongAttempts=0;
let thirdStep=0;

const thirdLines=[
"Yrrr pighalo mt 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭uhmm yelo",
"Oye kya krri ho ye bola na mt pighlaooo 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"yrrr pighal gya firse lelo hint 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"Oye sharam aari hai bohot zadaa kya krri hoo ye 😭😭😭😭😭😭😭😭😭😭😭😭😡😡😡😡😡😭😭😭😭😭😭😭😭😭😭😭😭😭",
"Baby no gandii baat🥺🥺🥺😭😭😭😭😭😭😭",
"Code type krte krte hi sharam aari h 😭🙈😭😭😭😭😭😭😭😭😭😭😭🙈🙈🙈😭",
"Oye ab bohot hora h aise hi krte krte pura password nikalwa login hainaa 🙄🥺🥺😭😭",
"oyee bol rhaaa hu maanjaooo kyaaa haii huhh huhh 🙈😡😡😡😡😭😭",
"Gandiii😭😭😭😭😭🙈🙈🥳🥳",
"NOOOOOO😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"DED 😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭😭",
"MAI HAAR MAANTA HOON 😭😭💋🛐😭😭😭"

function togglePassword(){
passInput.type = passInput.type==="password"?"text":"password";
}

function checkPassword(){

if(passInput.value.trim()==="") return;

if(passInput.value===password){
window.location.href="yesorno.html";
return;
}

wrongAttempts++;

document.getElementById('hintSection').style.display='block';

hintInput.value="";
hintText.style.display='none';
hintBox.style.display='none';

if(wrongAttempts===1){
hintHeader.textContent="Hint k liye kissiii do pehle huhh";
}

else if(wrongAttempts===2){
hintHeader.textContent="Ab 2nd hint ke liye kam se kam 30+ kisses chahiye huhh 🥺🥺😈";
}

else{
hintHeader.textContent="Firse galat..ab nhi milegi koi hint vint huhh ";
}

passInput.value="";
}

function displayHint(){

if(wrongAttempts===0) return;

const kissCount=(hintInput.value.match(/💋/g)||[]).length;

if(wrongAttempts===1 && kissCount>=1){

hintText.style.display='block';
hintBox.style.display='block';

hintText.textContent="Kya mujhe hint deni chahiye...uhmm...sochne do btau ya nhi 🤔...chalo bta hi deta hu huhhh";

hintBox.textContent="First nickname";
}

else if(wrongAttempts===2 && kissCount>=30){

hintText.style.display='block';
hintBox.style.display='block';

hintText.textContent="Kya mujhe hint deni chahiye...uhmm...sochne do btau ya nhi 🤔...chalo bta hi deta hu huhhh";

hintBox.textContent="Password capital letters me hai huhh";
}

else if(wrongAttempts>=3 && kissCount>=1 && thirdStep<thirdLines.length){

hintText.style.display='none';

hintBox.style.display='block';

const letter=password[thirdStep];

hintBox.innerHTML=
thirdLines[thirdStep] +
"<div class='revealed-letter'>Letter: "+letter+"</div>";

thirdStep++;

if(thirdStep===password.length){

hintBox.innerHTML=
thirdLines[thirdStep-1] +
"<div class='revealed-letter'>NEETWALIMADAM</div>";

}

}

hintInput.value="";

}

</script>

</body>
</html>
