<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
overflow:hidden;
touch-action:none; /* 🔥 IMPORTANT */
}

.container{
height:100vh;
width:100%;
position:relative;
overflow:hidden;
}

/* FIXED VIDEO DISPLAY */
video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:100%;
max-height:100%;
object-fit:contain;
background:black;
}

/* animation */
.slide-up{ transform:translate(-50%,-150%); transition:0.4s; }
.slide-center{ transform:translate(-50%,-50%); transition:0.4s; }
.slide-down{ transform:translate(-50%,50%); transition:0.4s; }

/* buttons */
.nav-buttons{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:10;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="nav-buttons">
<button onclick="window.location.href='love.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>

const container = document.getElementById("container");

let videos = [];
let index = 0;

/* 🔥 AUTO DETECT */
let i=1;
function detect(){
let v=document.createElement("video");
v.src=`edit${i}.mp4`;

v.onloadeddata=()=>{
videos.push(`edit${i}.mp4`);
i++;
detect();
};

v.onerror=()=>start();
}
detect();

/* 🔥 CREATE VIDEO */
function createVideo(src){
let v=document.createElement("video");
v.src=src;
v.loop=true;
v.playsInline=true;
v.setAttribute("webkit-playsinline","true");
v.preload="auto";
v.muted=false;
return v;
}

/* START */
let currentVideo;

function start(){

if(videos.length===0){
container.innerHTML="<p style='color:white'>No videos</p>";
return;
}

/* random */
index=Math.floor(Math.random()*videos.length);

currentVideo=createVideo(videos[index]);
currentVideo.className="slide-center";

container.appendChild(currentVideo);

/* FORCE PLAY FIX */
setTimeout(()=>{
currentVideo.play().catch(()=>{});
},100);

}

/* 🔥 SWIPE FIX (IMPORTANT) */
let startY=0;

document.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
},{passive:true});

document.addEventListener("touchmove",e=>{
e.preventDefault(); /* 🔥 FIX SCROLL ISSUE */
},{passive:false});

document.addEventListener("touchend",e=>{

let diff=startY-e.changedTouches[0].clientY;

/* NEXT */
if(diff>70 && index<videos.length-1){

let nextVideo=createVideo(videos[index+1]);
nextVideo.className="slide-down";
container.appendChild(nextVideo);

setTimeout(()=>{
currentVideo.className="slide-up";
nextVideo.className="slide-center";
},10);

setTimeout(()=>{
currentVideo.pause();
container.removeChild(currentVideo);

currentVideo=nextVideo;
index++;

currentVideo.play().catch(()=>{});

},400);

}

/* PREV */
else if(diff<-70 && index>0){

let prevVideo=createVideo(videos[index-1]);
prevVideo.className="slide-up";
container.appendChild(prevVideo);

setTimeout(()=>{
currentVideo.className="slide-down";
prevVideo.className="slide-center";
},10);

setTimeout(()=>{
currentVideo.pause();
container.removeChild(currentVideo);

currentVideo=prevVideo;
index--;

currentVideo.play().catch(()=>{});

},400);

}

});

</script>

</body>
</html>
