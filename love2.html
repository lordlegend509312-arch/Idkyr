<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Reels ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* Container */

.container{
height:100vh;
width:100%;
position:relative;
overflow:hidden;
}

/* Slides */

.reel{
position:absolute;
height:100%;
width:100%;

top:0;
left:0;

display:flex;
justify-content:center;
align-items:center;

transition:transform 0.4s ease;
}

/* Video */

video{
width:100%;
height:100%;
object-fit:cover;
}

/* Navigation (last slide only) */

.nav-buttons{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
font-size:14px;
}

</style>

</head>

<body>

<div class="container" id="container">

<div class="reel"><video src="edit1.mp4" muted loop></video></div>
<div class="reel"><video src="edit2.mp4" muted loop></video></div>
<div class="reel"><video src="edit3.mp4" muted loop></video></div>
<div class="reel"><video src="edit4.mp4" muted loop></video></div>
<div class="reel"><video src="edit5.mp4" muted loop></video></div>
<div class="reel"><video src="edit6.mp4" muted loop></video></div>
<div class="reel"><video src="edit7.mp4" muted loop></video></div>
<div class="reel"><video src="edit8.mp4" muted loop></video></div>
<div class="reel"><video src="edit9.mp4" muted loop></video></div>

<!-- Last Reel with buttons -->

<div class="reel">

<video src="edit10.mp4" muted loop></video>

<div class="nav-buttons">
<button onclick="window.location.href='yesorno.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

</div>

</div>

<script>

const reels = document.querySelectorAll(".reel");
const videos = document.querySelectorAll("video");

let current = 0;

/* Position reels */

function updateReels(){
reels.forEach((reel,index)=>{
reel.style.transform = `translateY(${(index - current) * 100}%)`;
});
}

/* Play only current video */

function playVideo(){
videos.forEach((video,i)=>{
if(i === current){
video.play();
}else{
video.pause();
}
});
}

/* Initial */

updateReels();
playVideo();

/* Swipe Logic */

let startY = 0;

document.addEventListener("touchstart", e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
let endY = e.changedTouches[0].clientY;
let diff = startY - endY;

if(diff > 50 && current < reels.length - 1){
current++;
}
else if(diff < -50 && current > 0){
current--;
}

updateReels();
playVideo();
});

</script>

</body>
</html>
