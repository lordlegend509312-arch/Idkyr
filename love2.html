<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reels ❤️</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: #000;
  height: 100%;
  width: 100%;
  overflow: hidden;
}

/* ── SLOTS ── */
.slot {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  transform: translateY(100%); /* below by default */
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.slot.active {
  transform: translateY(0);    /* visible */
  z-index: 2;
}
.slot.above {
  transform: translateY(-100%); /* above, already passed */
  z-index: 1;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  background: #000;
}

/* ── SPINNER ── */
#spinner {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 45px; height: 45px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #ff4da6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
  z-index: 10;
}
#spinner.show { display: block; }
@keyframes spin {
  to { transform: translate(-50%,-50%) rotate(360deg); }
}

/* ── TAP TO PLAY ── */
#tap {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #ff4da6;
  color: #fff;
  padding: 12px 26px;
  border-radius: 25px;
  display: none;
  z-index: 20;
  cursor: pointer;
  font-size: 15px;
}

/* ── NAV ── */
#nav {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 20;
}
#nav button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4da6;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 16px rgba(255,77,166,0.35);
}
#nav button:active { opacity: 0.7; }

/* ── SWIPE HINT ── */
#hint {
  position: fixed;
  bottom: 85px;
  width: 100%;
  text-align: center;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-family: sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  z-index: 20;
  pointer-events: none;
  animation: hintPulse 1.4s ease-in-out infinite;
  transition: opacity 0.4s ease;
}
#hint.hide { opacity: 0; }
@keyframes hintPulse {
  0%   { transform: translateY(4px);  opacity: 0.5; }
  50%  { transform: translateY(-4px); opacity: 1;   }
  100% { transform: translateY(4px);  opacity: 0.5; }
}
</style>
</head>
<body>

<div id="slot1" class="slot active">
  <video id="v1" playsinline loop></video>
</div>
<div id="slot2" class="slot">
  <video id="v2" playsinline loop></video>
</div>

<div id="spinner"></div>
<div id="tap">Tap to Play</div>
<div id="hint">Swipe Up</div>

<div id="nav">
  <button onclick="window.location.href='love.html'">⬅ Previous</button>
  <button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>
  const v1      = document.getElementById("v1");
  const v2      = document.getElementById("v2");
  const slot1   = document.getElementById("slot1");
  const slot2   = document.getElementById("slot2");
  const spinner = document.getElementById("spinner");
  const tap     = document.getElementById("tap");
  const hint    = document.getElementById("hint");

  let videos  = [];
  let index   = 0;
  let active  = 1;
  let locked  = false;
  let hintOff = false;
  let preEl   = null;

  /* ══════════════════════
     DETECT ALL edit*.mp4
     Parallel 1-50, skip gaps
  ══════════════════════ */
  function detectAll() {
    let resolved = 0;
    const found  = [];

    for (let i = 1; i <= 50; i++) {
      (function(num) {
        const t = document.createElement("video");
        t.preload = "metadata";
        t.src = `edit${num}.mp4`;

        t.onloadedmetadata = () => {
          t.src = "";
          found.push({ name: `edit${num}.mp4`, num });
          resolved++;
          if (resolved === 50) finish(found);
        };

        t.onerror = () => {
          t.src = "";
          resolved++;
          if (resolved === 50) finish(found);
        };
      })(i);
    }
  }

  function finish(found) {
    if (!found.length) {
      document.body.innerHTML = "<p style='color:white;padding:30px'>No videos found</p>";
      return;
    }
    // Sort then shuffle for random order every time
    found.sort((a, b) => a.num - b.num);
    videos = found.map(v => v.name);
    videos.sort(() => Math.random() - 0.5);
    start();
  }

  detectAll();

  /* ══════════════════════
     START — first video
  ══════════════════════ */
  function start() {
    spinner.classList.add("show");
    playInSlot(v1, slot1, videos[0], () => {
      preload();
    });
  }

  /* ══════════════════════
     PLAY IN SLOT — clean helper
     No repeated events, no loop bugs
  ══════════════════════ */
  function playInSlot(vid, slot, src, onReady) {
    // Fully reset video first
    vid.pause();
    vid.removeEventListener("canplaythrough", vid._handler);
    vid.src   = "";
    vid.load();

    vid.src   = src;
    vid.muted = false;
    vid.loop  = true;
    vid.load();

    const fallback = setTimeout(() => {
      spinner.classList.remove("show");
      locked = false;
      onReady && onReady();
    }, 5000);

    // FIX — store handler ref so we can remove it, no repeats
    vid._handler = () => {
      vid.removeEventListener("canplaythrough", vid._handler);
      clearTimeout(fallback);
      spinner.classList.remove("show");
      vid.play().catch(() => { tap.style.display = "block"; });
      onReady && onReady();
    };

    vid.addEventListener("canplaythrough", vid._handler);
  }

  /* ══════════════════════
     LOAD VIDEO ON SWIPE
  ══════════════════════ */
  function load(i) {
    if (i < 0 || i >= videos.length || locked) return;
    locked = true;

    // Hide hint
    if (!hintOff) {
      hintOff = true;
      hint.classList.add("hide");
      setTimeout(() => { hint.style.display = "none"; }, 400);
    }

    const nextV    = active === 1 ? v2    : v1;
    const currV    = active === 1 ? v1    : v2;
    const nextSlot = active === 1 ? slot2 : slot1;
    const currSlot = active === 1 ? slot1 : slot2;

    // Position next slot below (ready to slide up)
    nextSlot.classList.remove("active", "above");

    spinner.classList.add("show");

    playInSlot(nextV, nextSlot, videos[i], () => {
      // Slide animation — next comes up, current goes above
      nextSlot.classList.add("active");
      currSlot.classList.add("above");
      currSlot.classList.remove("active");

      // Stop old video after animation
      setTimeout(() => {
        currV.pause();
        currV.src = "";
        currV.load();
        currSlot.classList.remove("above");
      }, 400);

      active = active === 1 ? 2 : 1;
      index  = i;
      locked = false;

      preload();
    });
  }

  /* ══════════════════════
     PRELOAD NEXT
  ══════════════════════ */
  function preload() {
    if (preEl) { preEl.src = ""; preEl.load(); preEl = null; }
    if (index + 1 < videos.length) {
      preEl             = document.createElement("video");
      preEl.src         = videos[index + 1];
      preEl.preload     = "auto";
      preEl.muted       = true;
      preEl.playsInline = true;
    }
  }

  /* ══════════════════════
     TAP TO PLAY
  ══════════════════════ */
  tap.onclick = () => {
    const v = active === 1 ? v1 : v2;
    v.muted = false;
    v.play().catch(() => {});
    tap.style.display = "none";
  };

  /* ══════════════════════
     SWIPE
  ══════════════════════ */
  let startX = 0, startY = 0, swiped = false;

  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiped = false;
  }, { passive: true });

  document.addEventListener("touchmove", e => {
    if (locked || swiped) return;

    const diffX = Math.abs(e.touches[0].clientX - startX);
    const diffY = startY - e.touches[0].clientY;

    if (Math.abs(diffY) > 50 && diffX < 35) {
      e.preventDefault();
      swiped = true;

      if (diffY > 0) load(index + 1); // swipe up = next
      else           load(index - 1); // swipe down = prev
    }
  }, { passive: false });

  document.addEventListener("touchend", () => {
    swiped = false;
  }, { passive: true });
</script>
</body>
</html>
