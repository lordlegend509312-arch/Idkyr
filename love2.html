<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reels ❤️</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: #000;
  height: 100%;
  width: 100%;
  overflow: hidden;
  position: fixed;        /* prevents ANY scroll on iOS */
  touch-action: none;     /* blocks browser scroll on all mobile */
}

.slot {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  background: #000;
}

#spinner {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 45px; height: 45px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #ff4da6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
  z-index: 10;
}
#spinner.show { display: block; }
@keyframes spin {
  to { transform: translate(-50%,-50%) rotate(360deg); }
}

#tap {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #ff4da6;
  color: #fff;
  padding: 12px 26px;
  border-radius: 25px;
  display: none;
  z-index: 20;
  cursor: pointer;
  font-size: 15px;
}

#nav {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 20;
}
#nav button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4da6;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 16px rgba(255,77,166,0.35);
}
#nav button:active { opacity: 0.7; }

#hint {
  position: fixed;
  bottom: 85px;
  width: 100%;
  text-align: center;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-family: sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  z-index: 20;
  pointer-events: none;
  animation: hintPulse 1.4s ease-in-out infinite;
  transition: opacity 0.4s ease;
}
#hint.hide { opacity: 0; }
@keyframes hintPulse {
  0%   { transform: translateY(4px);  opacity: 0.5; }
  50%  { transform: translateY(-4px); opacity: 1;   }
  100% { transform: translateY(4px);  opacity: 0.5; }
}
</style>
</head>
<body>

<div id="slot1" class="slot" style="transform:translateY(0);z-index:2">
  <video id="v1" playsinline loop></video>
</div>
<div id="slot2" class="slot" style="transform:translateY(100%)">
  <video id="v2" playsinline loop></video>
</div>

<div id="spinner"></div>
<div id="tap">Tap to Play</div>
<div id="hint">Swipe Up</div>

<div id="nav">
  <button onclick="window.location.href='love.html'">⬅ Previous</button>
  <button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>
  const v1      = document.getElementById("v1");
  const v2      = document.getElementById("v2");
  const slot1   = document.getElementById("slot1");
  const slot2   = document.getElementById("slot2");
  const spinner = document.getElementById("spinner");
  const tap     = document.getElementById("tap");
  const hint    = document.getElementById("hint");

  let videos  = [];
  let index   = 0;
  let active  = 1;
  let locked  = false;
  let hintOff = false;
  let preNext = null;
  let prePrev = null;

  /* ══════════════════════
     DETECT ALL edit*.mp4
  ══════════════════════ */
  function detectAll() {
    let resolved = 0;
    const found  = [];

    for (let i = 1; i <= 50; i++) {
      (function(num) {
        const t   = document.createElement("video");
        t.preload = "metadata";
        t.src     = `edit${num}.mp4`;

        t.onloadedmetadata = () => {
          t.src = "";
          found.push({ name: `edit${num}.mp4`, num });
          resolved++;
          if (resolved === 50) finish(found);
        };
        t.onerror = () => {
          t.src = "";
          resolved++;
          if (resolved === 50) finish(found);
        };
      })(i);
    }
  }

  function finish(found) {
    if (!found.length) {
      document.body.innerHTML = "<p style='color:white;padding:30px'>No videos found</p>";
      return;
    }
    found.sort((a, b) => a.num - b.num);
    videos = found.map(v => v.name);

    // Fisher-Yates shuffle
    for (let i = videos.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [videos[i], videos[j]] = [videos[j], videos[i]];
    }

    start();
  }

  detectAll();

  /* ══════════════════════
     POSITION HELPERS
     setPos(slot, "visible")  → translateY(0)
     setPos(slot, "below")    → translateY(100%)
     setPos(slot, "above")    → translateY(-100%)
  ══════════════════════ */
  function setPos(slot, pos) {
    slot.style.transition = "none"; // instant, no animation
    if (pos === "visible") slot.style.transform = "translateY(0)";
    if (pos === "below")   slot.style.transform = "translateY(100%)";
    if (pos === "above")   slot.style.transform = "translateY(-100%)";
    // Force reflow so transition applies after
    slot.offsetHeight;
    slot.style.transition = "";
  }

  function animateTo(slot, pos) {
    if (pos === "visible") slot.style.transform = "translateY(0)";
    if (pos === "below")   slot.style.transform = "translateY(100%)";
    if (pos === "above")   slot.style.transform = "translateY(-100%)";
  }

  /* ══════════════════════
     LOAD INTO VIDEO ELEMENT
  ══════════════════════ */
  function loadVid(vid, src, onReady) {
    // Remove old handler
    if (vid._handler) {
      vid.removeEventListener("canplaythrough", vid._handler);
      vid.removeEventListener("canplay", vid._handler);
      vid._handler = null;
    }

    vid.pause();
    vid.src   = src;
    vid.muted = false;
    vid.loop  = true;
    vid.load();

    let fired = false; // prevent double fire

    // Safety fallback — unlock after 4s no matter what
    const fallback = setTimeout(() => {
      if (fired) return;
      fired = true;
      if (vid._handler) {
        vid.removeEventListener("canplaythrough", vid._handler);
        vid.removeEventListener("canplay", vid._handler);
        vid._handler = null;
      }
      spinner.classList.remove("show");
      locked = false;
      vid.play().catch(() => { tap.style.display = "block"; });
      onReady && onReady();
    }, 4000);

    vid._handler = () => {
      if (fired) return;
      fired = true;
      vid.removeEventListener("canplaythrough", vid._handler);
      vid.removeEventListener("canplay", vid._handler);
      vid._handler = null;
      clearTimeout(fallback);
      spinner.classList.remove("show");
      locked = false; // unlock here too — not just in onReady
      vid.play().catch(() => { tap.style.display = "block"; });
      onReady && onReady();
    };

    // Listen to BOTH canplay and canplaythrough — whichever fires first
    vid.addEventListener("canplay", vid._handler);
    vid.addEventListener("canplaythrough", vid._handler);

    // If already ready (preloaded) — fire immediately
    if (vid.readyState >= 2) {
      vid._handler();
    }
  }

  /* ══════════════════════
     START
  ══════════════════════ */
  function start() {
    spinner.classList.add("show");
    setPos(slot1, "visible");
    slot1.style.zIndex = "2";

    loadVid(v1, videos[0], () => {
      index  = 0;
      active = 1;
      locked = false;
      preload();
    });
  }

  /* ══════════════════════
     LOAD — direction aware
     dir "up"   = swipe up   (next video slides in from below)
     dir "down" = swipe down (prev video slides in from above)
  ══════════════════════ */
  function load(i, dir) {
    if (i < 0 || i >= videos.length || locked) return;
    locked = true;

    // Hide hint on first swipe
    if (!hintOff) {
      hintOff = true;
      hint.classList.add("hide");
      setTimeout(() => { hint.style.display = "none"; }, 400);
    }

    const currVid  = active === 1 ? v1    : v2;
    const currSlot = active === 1 ? slot1 : slot2;
    const nextVid  = active === 1 ? v2    : v1;
    const nextSlot = active === 1 ? slot2 : slot1;

    // Place next slot in correct starting position instantly
    if (dir === "up") {
      setPos(nextSlot, "below");  // comes from below
    } else {
      setPos(nextSlot, "above");  // comes from above
    }

    nextSlot.style.zIndex = "3"; // on top during animation
    currSlot.style.zIndex = "2";

    spinner.classList.add("show");

    // Clear old video in next slot
    if (nextVid._handler) {
      nextVid.removeEventListener("canplaythrough", nextVid._handler);
      nextVid._handler = null;
    }
    nextVid.pause();
    nextVid.src = "";
    nextVid.load();

    loadVid(nextVid, videos[i], () => {

      // Animate next into view
      animateTo(nextSlot, "visible");

      // Push current out opposite direction
      if (dir === "up") {
        animateTo(currSlot, "above");  // current exits above
      } else {
        animateTo(currSlot, "below");  // current exits below
      }

      // After animation — clean up current slot
      setTimeout(() => {
        currVid.pause();
        currVid.src = "";
        currVid.load();
        currSlot.style.zIndex = "1";
        nextSlot.style.zIndex = "2";
      }, 400);

      active = active === 1 ? 2 : 1;
      index  = i;
      locked = false;

      preload();
    });
  }

  /* ══════════════════════
     PRELOAD NEXT + PREV
  ══════════════════════ */
  function preload() {
    if (preNext) { preNext.src = ""; preNext.load(); preNext = null; }
    if (prePrev) { prePrev.src = ""; prePrev.load(); prePrev = null; }

    if (index + 1 < videos.length) {
      preNext             = document.createElement("video");
      preNext.src         = videos[index + 1];
      preNext.preload     = "auto";
      preNext.muted       = true;
      preNext.playsInline = true;
    }

    if (index - 1 >= 0) {
      prePrev             = document.createElement("video");
      prePrev.src         = videos[index - 1];
      prePrev.preload     = "auto";
      prePrev.muted       = true;
      prePrev.playsInline = true;
    }
  }

  /* ══════════════════════
     TAP TO PLAY
  ══════════════════════ */
  tap.onclick = () => {
    const v = active === 1 ? v1 : v2;
    v.muted = false;
    v.play().catch(() => {});
    tap.style.display = "none";
  };

  /* ══════════════════════
     SWIPE
  ══════════════════════ */
  let startX = 0, startY = 0, swiped = false;

  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiped = false;
  }, { passive: true });

  document.addEventListener("touchmove", e => {
    if (locked || swiped) return;

    const diffX = Math.abs(e.touches[0].clientX - startX);
    const diffY = startY - e.touches[0].clientY;

    if (Math.abs(diffY) > 50 && diffX < 35) {
      e.preventDefault();
      swiped = true;

      if (diffY > 0) load(index + 1, "up");   // swipe UP   → next
      else           load(index - 1, "down");  // swipe DOWN → prev
    }
  }, { passive: false });

  document.addEventListener("touchend", () => {
    swiped = false;
  }, { passive: true });
</script>
</body>
</html>
