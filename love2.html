<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reels ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000;
    overflow: hidden;
    height: 100%;
    width: 100%;
  }

  #screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #screen video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
    pointer-events: none;
  }

  /* ── SPINNER ── */
  #spinner {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 46px; height: 46px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #ff4da6;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    z-index: 10;
    display: none;
  }
  #spinner.show { display: block; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── TAP TO PLAY ── */
  #tapPlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,77,166,0.92);
    color: #fff;
    padding: 13px 28px;
    border-radius: 30px;
    font-size: 15px;
    z-index: 20;
    display: none;
    cursor: pointer;
  }
  #tapPlay.show { display: block; }

  /* ── NAV BUTTONS ── */
  #navBtns {
    position: fixed;
    bottom: 24px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 22px;
    z-index: 20;
  }
  #navBtns button {
    padding: 11px 22px;
    border: none;
    border-radius: 22px;
    background: #ff4da6;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 18px rgba(255,77,166,0.35);
  }
  #navBtns button:active { opacity: 0.7; }

  /* ══════════════════════════════
     SWIPE HINT OVERLAY
  ══════════════════════════════ */
  #swipeHint {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.5s ease;
  }

  #swipeHint.hide {
    opacity: 0;
  }

  /* Hand icon */
  .hand {
    font-size: 52px;
    animation: swipeUp 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255,77,166,0.8));
  }

  /* Swipe up text */
  .hint-text {
    margin-top: 14px;
    color: rgba(255,255,255,0.9);
    font-size: 15px;
    font-family: sans-serif;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    animation: fadeInOut 1.4s ease-in-out infinite;
  }

  /* Lines showing swipe direction */
  .hint-lines {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    margin-bottom: 20px;
    animation: swipeUp 1.4s ease-in-out infinite;
  }

  .hint-line {
    width: 2px;
    border-radius: 2px;
    background: rgba(255,77,166,0.9);
  }
  .hint-line:nth-child(1) { height: 28px; opacity: 0.4; }
  .hint-line:nth-child(2) { height: 20px; opacity: 0.7; }
  .hint-line:nth-child(3) { height: 12px; opacity: 1;   }

  @keyframes swipeUp {
    0%   { transform: translateY(16px); opacity: 0.4; }
    50%  { transform: translateY(-6px); opacity: 1;   }
    100% { transform: translateY(16px); opacity: 0.4; }
  }

  @keyframes fadeInOut {
    0%   { opacity: 0.4; }
    50%  { opacity: 1;   }
    100% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div id="screen"></div>
<div id="spinner"></div>
<div id="tapPlay">▶ Tap to Play</div>

<!-- Swipe hint — shows on first load only -->
<div id="swipeHint">
  <div class="hint-lines">
    <div class="hint-line"></div>
    <div class="hint-line"></div>
    <div class="hint-line"></div>
  </div>
  <div class="hand">👆</div>
  <div class="hint-text">Swipe up for next</div>
</div>

<div id="navBtns">
  <button onclick="window.location.href='love.html'">⬅ Previous</button>
  <button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>
  const screen    = document.getElementById("screen");
  const spinner   = document.getElementById("spinner");
  const tapPlay   = document.getElementById("tapPlay");
  const swipeHint = document.getElementById("swipeHint");

  let videos      = [];
  let current     = 0;
  let isBusy      = false;
  let activeVid   = null;
  let preloadNext = null;
  let preloadPrev = null;
  let hintShown   = true; // hint visible on first load

  /* ── Hide swipe hint ── */
  function hideHint() {
    if (!hintShown) return;
    hintShown = false;
    swipeHint.classList.add("hide");
    setTimeout(() => { swipeHint.style.display = "none"; }, 500);
  }

  /* ══════════════════════
     DETECT VIDEOS
  ══════════════════════ */
  function detectVideos(index, done) {
    const probe = document.createElement("video");
    probe.preload = "metadata";
    probe.src = `edit${index}.mp4`;

    probe.onloadedmetadata = () => {
      probe.src = "";
      videos.push(`edit${index}.mp4`);
      detectVideos(index + 1, done);
    };

    probe.onerror = () => {
      probe.src = "";
      done();
    };
  }

  /* ══════════════════════
     LOAD VIDEO
  ══════════════════════ */
  function loadVideo(index) {
    if (index < 0 || index >= videos.length || isBusy) return;

    isBusy = true;
    tapPlay.classList.remove("show");
    spinner.classList.add("show");

    // Destroy current
    if (activeVid) {
      activeVid.pause();
      activeVid.src = "";
      activeVid.load();
      activeVid.remove();
      activeVid = null;
    }

    // Use preloaded if available
    let vid = null;
    if (preloadNext && preloadNext._index === index) {
      vid = preloadNext; preloadNext = null;
    } else if (preloadPrev && preloadPrev._index === index) {
      vid = preloadPrev; preloadPrev = null;
    }

    // Free stale preloads
    if (preloadNext) { preloadNext.src = ""; preloadNext.load(); preloadNext = null; }
    if (preloadPrev) { preloadPrev.src = ""; preloadPrev.load(); preloadPrev = null; }

    if (!vid) {
      vid = document.createElement("video");
      vid.src     = videos[index];
      vid.preload = "auto";
    }

    vid.loop        = true;
    vid.muted       = false;
    vid.playsInline = true;
    vid._index      = index;

    screen.appendChild(vid);
    activeVid = vid;
    current   = index;

    // Safety unlock after 5s
    let unlockTimer = setTimeout(() => {
      spinner.classList.remove("show");
      isBusy = false;
      schedulePreload();
    }, 5000);

    const onReady = () => {
      clearTimeout(unlockTimer);
      spinner.classList.remove("show");
      isBusy = false;
      vid.play().catch(() => tapPlay.classList.add("show"));
      schedulePreload();
    };

    if (vid.readyState >= 3) {
      onReady();
    } else {
      vid.oncanplay = () => { vid.oncanplay = null; onReady(); };
    }
  }

  /* ══════════════════════
     PRELOAD NEXT + PREV
  ══════════════════════ */
  function schedulePreload() {
    if (current + 1 < videos.length) {
      if (!preloadNext || preloadNext._index !== current + 1) {
        if (preloadNext) { preloadNext.src = ""; preloadNext.load(); }
        const pn = document.createElement("video");
        pn.src = videos[current + 1]; pn.preload = "auto";
        pn.muted = true; pn.playsInline = true; pn._index = current + 1;
        preloadNext = pn;
      }
    }
    if (current - 1 >= 0) {
      if (!preloadPrev || preloadPrev._index !== current - 1) {
        if (preloadPrev) { preloadPrev.src = ""; preloadPrev.load(); }
        const pp = document.createElement("video");
        pp.src = videos[current - 1]; pp.preload = "auto";
        pp.muted = true; pp.playsInline = true; pp._index = current - 1;
        preloadPrev = pp;
      }
    }
  }

  /* ══════════════════════
     TAP TO PLAY
  ══════════════════════ */
  tapPlay.addEventListener("click", () => {
    if (activeVid) activeVid.play().catch(() => {});
    tapPlay.classList.remove("show");
  });

  /* ══════════════════════
     SWIPE
  ══════════════════════ */
  let startX = 0;
  let startY = 0;
  let swiped = false;

  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiped = false;
  }, { passive: false });

  document.addEventListener("touchmove", e => {
    if (swiped) { e.preventDefault(); return; }
    if (isBusy) return;

    const diffX = Math.abs(e.touches[0].clientX - startX);
    const diffY = startY - e.touches[0].clientY;

    if (Math.abs(diffY) > 40 && diffX < 30) {
      e.preventDefault();
      swiped = true;
      hideHint(); // hide hint on first swipe

      if (diffY > 0 && current < videos.length - 1) {
        loadVideo(current + 1);
      } else if (diffY < 0 && current > 0) {
        loadVideo(current - 1);
      } else {
        isBusy = false;
      }
    }
  }, { passive: false });

  document.addEventListener("touchend", () => {
    swiped = false;
  }, { passive: true });

  /* ══════════════════════
     START
  ══════════════════════ */
  detectVideos(1, () => {
    if (videos.length === 0) {
      screen.innerHTML = "<p style='color:white;padding:30px;font-size:16px'>Koi video nahi mili 😢</p>";
      return;
    }
    loadVideo(0);
  });
</script>
</body>
</html>
