<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
overflow:hidden;
}

/* container */

.container{
height:100vh;
width:100%;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

/* VIDEO FIX (NO ZOOM + FULL FIT) */

video{
width:100%;
height:100%;
object-fit:contain;
position:absolute;
top:0;
left:0;
background:black;
}

/* buttons */

.nav-buttons{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:10;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}
</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="nav-buttons">
<button onclick="window.location.href='love.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>

const container = document.getElementById("container");

let videos = [];
let current = 0;
let currentVideo = null;

/* 🔥 DETECT VIDEOS PROPERLY */

let i = 1;

function detect(){
    let v = document.createElement("video");
    v.src = `edit${i}.mp4`;

    v.onloadeddata = ()=>{
        videos.push(`edit${i}.mp4`);
        i++;
        detect();
    };

    v.onerror = ()=>{
        start();
    };
}

detect();

/* START */

function start(){

    if(videos.length === 0){
        container.innerHTML = "<p style='color:white'>No videos found</p>";
        return;
    }

    current = 0; // 🔥 always start from first video
    loadVideo(current);
}

/* 🔥 LOAD VIDEO (STABLE) */

function loadVideo(index){

    if(currentVideo){
        currentVideo.pause();
        currentVideo.remove();
    }

    const v = document.createElement("video");
    v.src = videos[index];
    v.autoplay = true;
    v.loop = true;
    v.muted = false;
    v.playsInline = true;
    v.preload = "auto";

    container.appendChild(v);

    v.onloadeddata = ()=>{
        v.play().catch(()=>{});
    };

    currentVideo = v;
}

/* 🔥 SWIPE SYSTEM (FIXED) */

let startY = 0;
let isMoving = false;

document.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
    isMoving = true;
});

document.addEventListener("touchmove", e=>{
    if(!isMoving) return;

    let moveY = e.touches[0].clientY;
    let diff = startY - moveY;

    if(Math.abs(diff) > 50){

        isMoving = false;

        /* NEXT */
        if(diff > 0 && current < videos.length - 1){
            current++;
            loadVideo(current);
        }

        /* PREVIOUS */
        else if(diff < 0 && current > 0){
            current--;
            loadVideo(current);
        }
    }
});

document.addEventListener("touchend", ()=>{
    isMoving = false;
});

</script>

</body>
</html>
