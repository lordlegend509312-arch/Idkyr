<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reels ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    touch-action: none;
  }

  /* ── FULL SCREEN CONTAINER ── */
  #reelContainer {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #000;
  }

  /* ── EACH REEL SLOT ── */
  .reel {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reel video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }

  /* ── SPINNER ── */
  .spinner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 46px; height: 46px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: #ff4da6;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    z-index: 5;
    display: none;
  }
  .spinner.show { display: block; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── TAP TO PLAY ── */
  #tapPlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,77,166,0.92);
    color: #fff;
    padding: 13px 26px;
    border-radius: 30px;
    font-size: 15px;
    z-index: 30;
    display: none;
    cursor: pointer;
  }
  #tapPlay.show { display: block; }

  /* ── NAV BUTTONS ── */
  #navBtns {
    position: fixed;
    bottom: 24px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 22px;
    z-index: 30;
  }

  #navBtns button {
    padding: 11px 22px;
    border: none;
    border-radius: 22px;
    background: #ff4da6;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 18px rgba(255,77,166,0.35);
  }
  #navBtns button:active { opacity: 0.75; }
</style>
</head>
<body>

<div id="reelContainer"></div>
<div id="tapPlay">▶ Tap to Play</div>

<div id="navBtns">
  <button onclick="window.location.href='love.html'">⬅ Previous</button>
  <button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>
  const reelContainer = document.getElementById("reelContainer");
  const tapPlay       = document.getElementById("tapPlay");

  let videos   = [];   // all detected filenames
  let reelEls  = [];   // DOM elements for each reel
  let current  = 0;
  let isBusy   = false;

  /* ══════════════════════════
     STEP 1 — DETECT ALL VIDEOS
     Tries edit1.mp4, edit2.mp4 ...
     Stops at first missing file
  ══════════════════════════ */
  function detectVideos(index, callback) {
    const probe = document.createElement("video");
    probe.preload = "metadata";
    probe.src     = `edit${index}.mp4`;

    probe.onloadedmetadata = () => {
      probe.src = "";
      videos.push(`edit${index}.mp4`);
      detectVideos(index + 1, callback);
    };

    probe.onerror = () => {
      probe.src = "";
      callback(); // done detecting
    };
  }

  /* ══════════════════════════
     STEP 2 — BUILD REEL SLOTS
     One <div class="reel"> per video
     Position them using translateY
  ══════════════════════════ */
  function buildReels() {
    if (videos.length === 0) {
      reelContainer.innerHTML = "<p style='color:white;padding:30px;font-size:16px'>Koi video nahi mili 😢</p>";
      return;
    }

    videos.forEach((src, idx) => {
      const reel = document.createElement("div");
      reel.className = "reel";

      // Position: current = 0 (visible), others stacked below
      reel.style.transform = `translateY(${idx * 100}%)`;

      // Spinner
      const spinner = document.createElement("div");
      spinner.className = "spinner";
      reel.appendChild(spinner);

      // Video element
      const vid = document.createElement("video");
      vid.src         = src;
      vid.loop        = true;
      vid.playsInline = true;
      vid.preload     = "auto";
      vid.muted       = (idx !== 0); // only first unmuted initially
      reel.appendChild(vid);

      reelContainer.appendChild(reel);
      reelEls.push(reel);
    });

    // Play first video
    playReel(0);
  }

  /* ══════════════════════════
     STEP 3 — PLAY A REEL
  ══════════════════════════ */
  function playReel(index) {
    const reel    = reelEls[index];
    const vid     = reel.querySelector("video");
    const spinner = reel.querySelector(".spinner");

    // Unmute current, mute others
    reelEls.forEach((r, i) => {
      const v = r.querySelector("video");
      if (v) v.muted = (i !== index);
    });

    const tryPlay = () => {
      spinner.classList.remove("show");
      isBusy = false;
      vid.play().catch(() => {
        tapPlay.classList.add("show");
      });
    };

    if (vid.readyState >= 3) {
      tryPlay();
    } else {
      spinner.classList.add("show");
      vid.oncanplay = () => {
        vid.oncanplay = null;
        tryPlay();
      };
    }
  }

  /* ══════════════════════════
     STEP 4 — SLIDE TO INDEX
     Moves ALL reels so current
     is always at translateY(0)
  ══════════════════════════ */
  function goTo(index) {
    if (index < 0 || index >= videos.length || isBusy) return;

    isBusy = true;
    current = index;

    // Pause all except current
    reelEls.forEach((r, i) => {
      const v = r.querySelector("video");
      if (v && i !== index) v.pause();
    });

    // Reposition all reels relative to current
    reelEls.forEach((reel, i) => {
      reel.style.transform = `translateY(${(i - index) * 100}%)`;
    });

    playReel(index);
  }

  /* ══════════════════════════
     STEP 5 — TAP TO PLAY
  ══════════════════════════ */
  tapPlay.addEventListener("click", () => {
    const vid = reelEls[current].querySelector("video");
    if (vid) vid.play().catch(() => {});
    tapPlay.classList.remove("show");
  });

  /* ══════════════════════════
     STEP 6 — SWIPE (UP/DOWN)
  ══════════════════════════ */
  let touchStartY = 0;
  let didSwipe    = false;

  document.addEventListener("touchstart", e => {
    if (isBusy) return;
    touchStartY = e.touches[0].clientY;
    didSwipe    = false;
  }, { passive: true });

  document.addEventListener("touchmove", e => {
    if (isBusy || didSwipe) return;

    const diff = touchStartY - e.touches[0].clientY;

    if (Math.abs(diff) > 50) {
      didSwipe = true;
      if (diff > 0) {
        goTo(current + 1); // swipe up = next
      } else {
        goTo(current - 1); // swipe down = previous
      }
    }
  }, { passive: true });

  document.addEventListener("touchend", () => {
    didSwipe = false;
  }, { passive: true });

  /* ══════════════════════════
     START — detect then build
  ══════════════════════════ */
  detectVideos(1, buildReels);
</script>
</body>
</html>
