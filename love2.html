<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
overflow:hidden;
}

.container{
height:100vh;
width:100%;
position:relative;
overflow:hidden;
}

.reel{
position:absolute;
height:100%;
width:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

video{
max-width:100%;
max-height:100%;
width:auto;
height:auto;
background:black;
}

.swipe-hint{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
color:white;
animation:updown 1s infinite;
}

@keyframes updown{
0%{transform:translate(-50%,10px);opacity:0;}
50%{opacity:1;}
100%{transform:translate(-50%,-10px);opacity:0;}
}

.tap{
position:absolute;
bottom:50%;
left:50%;
transform:translate(-50%,50%);
color:white;
}

</style>
</head>

<body>

<div class="container" id="container"></div>
<div class="swipe-hint" id="hint">⬆ Swipe</div>
<div class="tap" id="tap">Tap for sound 🔊</div>

<script>

const container = document.getElementById("container");
const hint = document.getElementById("hint");
const tap = document.getElementById("tap");

const total = 10;
let current = Math.floor(Math.random()*total);

let sound = false;
let swiped = false;

let currentVideo = null;

/* 🔥 LOAD SINGLE VIDEO */

function createVideo(index){
let video = document.createElement("video");
video.src = `edit${index}.mp4`;
video.loop = true;
video.playsInline = true;
video.muted = !sound;
video.autoplay = true;
video.preload = "auto";
return video;
}

/* 🔥 RENDER ONLY CURRENT */

function render(){

container.innerHTML = "";

let div = document.createElement("div");
div.className = "reel";

let video = createVideo(current);
currentVideo = video;

div.appendChild(video);
container.appendChild(div);

/* force play */
video.play().catch(()=>{});

}

/* INITIAL */
render();

/* SOUND */

document.addEventListener("click", ()=>{
if(!sound){
sound = true;
tap.style.display="none";
render(); // reload with sound
}
});

/* SWIPE */

let startY=0;

document.addEventListener("touchstart",e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{

let diff = startY - e.changedTouches[0].clientY;

if(diff > 50 && current < total-1){
current++;
}
else if(diff < -50 && current > 0){
current--;
}else{
return;
}

/* hide hint */
if(!swiped){
swiped = true;
hint.style.display="none";
}

render();

});

</script>

</body>
</html>
