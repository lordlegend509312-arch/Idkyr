<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Reels ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
}

/* Container */

.container{
height:100vh;
width:100%;
position:relative;
overflow:hidden;
}

/* Reel */

.reel{
position:absolute;
height:100%;
width:100%;

display:flex;
justify-content:center;
align-items:center;

transition:transform 0.4s ease;
}

/* Video */

video{
width:100%;
height:100%;
object-fit:cover;
}

/* Navigation (always visible properly) */

.nav-buttons{
position:fixed;
bottom:20px;
left:0;
width:100%;

display:flex;
justify-content:space-between;
padding:0 20px;
z-index:10;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}

</style>

</head>

<body>

<div class="container" id="container"></div>

<!-- Navigation -->

<div class="nav-buttons">
<button onclick="window.location.href='yesorno.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>

/* 🔥 IMPORTANT: Sirf jitni videos hain wahi add kar */

const videoList = [
"edit1.mp4",
"edit2.mp4",
"edit3.mp4",
"edit4.mp4",
"edit5.mp4",
"edit6.mp4",
"edit7.mp4",
"edit8.mp4"
// 👉 yaha bas jitni files ho utni hi likh
];

const container = document.getElementById("container");

let current = 0;

/* Create reels dynamically */

videoList.forEach((src)=>{
const div = document.createElement("div");
div.className = "reel";

const video = document.createElement("video");
video.src = src;
video.muted = true;
video.loop = true;

div.appendChild(video);
container.appendChild(div);
});

const reels = document.querySelectorAll(".reel");
const videos = document.querySelectorAll("video");

/* Position reels */

function update(){
reels.forEach((r,i)=>{
r.style.transform = `translateY(${(i - current) * 100}%)`;
});
}

/* Play only current */

function play(){
videos.forEach((v,i)=>{
if(i === current){
v.play();
}else{
v.pause();
}
});
}

update();
play();

/* Swipe */

let startY = 0;

document.addEventListener("touchstart", e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
let endY = e.changedTouches[0].clientY;
let diff = startY - endY;

if(diff > 50 && current < reels.length - 1){
current++;
}
else if(diff < -50 && current > 0){
current--;
}

update();
play();
});

</script>

</body>
</html>
