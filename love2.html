<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reels ❤️</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: #000;
  height: 100%;
  width: 100%;
  overflow: hidden;
}

/* Two slots — A and B */
.slot {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  z-index: 1;
  transition: opacity 0.25s ease;
}
.slot.active {
  opacity: 1;
  z-index: 2;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}

/* Spinner */
#spinner {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 45px; height: 45px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #ff4da6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
  z-index: 10;
}
#spinner.show { display: block; }
@keyframes spin {
  to { transform: translate(-50%,-50%) rotate(360deg); }
}

/* Tap to play */
#tap {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #ff4da6;
  color: #fff;
  padding: 12px 26px;
  border-radius: 25px;
  display: none;
  z-index: 20;
  cursor: pointer;
  font-size: 15px;
}

/* Nav buttons — page navigation only */
#nav {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 20;
}
#nav button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4da6;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 16px rgba(255,77,166,0.35);
}
#nav button:active { opacity: 0.7; }

/* Swipe hint */
#hint {
  position: fixed;
  bottom: 85px;
  width: 100%;
  text-align: center;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-family: sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  z-index: 20;
  pointer-events: none;
  animation: hintPulse 1.4s ease-in-out infinite;
  transition: opacity 0.4s ease;
}
#hint.hide {
  opacity: 0;
  pointer-events: none;
}
@keyframes hintPulse {
  0%   { transform: translateY(4px);  opacity: 0.5; }
  50%  { transform: translateY(-4px); opacity: 1;   }
  100% { transform: translateY(4px);  opacity: 0.5; }
}
</style>
</head>
<body>

<!-- Slot A -->
<div id="slot1" class="slot active">
  <video id="v1" playsinline loop></video>
</div>

<!-- Slot B -->
<div id="slot2" class="slot">
  <video id="v2" playsinline loop></video>
</div>

<div id="spinner"></div>
<div id="tap">Tap to Play</div>
<div id="hint">Swipe Up</div>

<div id="nav">
  <!-- Buttons only navigate pages, NOT videos -->
  <button onclick="window.location.href='love.html'">⬅ Previous</button>
  <button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>
  const v1      = document.getElementById("v1");
  const v2      = document.getElementById("v2");
  const slot1   = document.getElementById("slot1");
  const slot2   = document.getElementById("slot2");
  const spinner = document.getElementById("spinner");
  const tap     = document.getElementById("tap");
  const hint    = document.getElementById("hint");

  let videos  = [];
  let index   = 0;
  let active  = 1;     // which slot is showing: 1 or 2
  let locked  = false; // swipe lock
  let hintOff = false; // hint shown once only
  let preEl   = null;  // preload element

  /* ══════════════════════
     DETECT VIDEOS
  ══════════════════════ */
  function detect(i) {
    const t = document.createElement("video");
    t.preload = "metadata";
    t.src = `edit${i}.mp4`;

    t.onloadedmetadata = () => {
      t.src = ""; // FIX #4 — free memory
      videos.push(`edit${i}.mp4`);
      detect(i + 1);
    };

    t.onerror = () => {
      t.src = "";
      start();
    };
  }

  detect(1);

  /* ══════════════════════
     START — load first video
  ══════════════════════ */
  function start() {
    if (!videos.length) {
      document.body.innerHTML = "<p style='color:white;padding:30px'>No videos found</p>";
      return;
    }

    spinner.classList.add("show");

    v1.src   = videos[0];
    v1.muted = false; // FIX #1 — unmuted from start
    v1.load();

    // FIX #5 — timeout fallback so page never freezes
    const fallback = setTimeout(() => {
      spinner.classList.remove("show");
      locked = false;
    }, 5000);

    v1.oncanplaythrough = () => {
      v1.oncanplaythrough = null;
      clearTimeout(fallback);
      spinner.classList.remove("show");
      v1.play().catch(() => { tap.style.display = "block"; });
      preload();
    };
  }

  /* ══════════════════════
     LOAD VIDEO (swipe)
  ══════════════════════ */
  function load(i) {
    if (i < 0 || i >= videos.length || locked) return;
    locked = true;

    // Hide hint on first swipe — FIX #7
    if (!hintOff) {
      hintOff = true;
      hint.classList.add("hide");
      setTimeout(() => { hint.style.display = "none"; }, 400);
    }

    const nextV    = active === 1 ? v2    : v1;
    const currV    = active === 1 ? v1    : v2;
    const nextSlot = active === 1 ? slot2 : slot1;
    const currSlot = active === 1 ? slot1 : slot2;

    spinner.classList.add("show");

    nextV.src   = videos[i];
    nextV.muted = false; // FIX #1 — always unmuted
    nextV.load();

    // FIX #5 — fallback unlock if canplaythrough never fires
    const fallback = setTimeout(() => {
      spinner.classList.remove("show");
      locked = false;
    }, 5000);

    nextV.oncanplaythrough = () => {
      nextV.oncanplaythrough = null;
      clearTimeout(fallback);
      spinner.classList.remove("show");

      nextV.play().catch(() => { tap.style.display = "block"; });

      // Crossfade slots
      nextSlot.classList.add("active");
      currSlot.classList.remove("active");

      // Stop and clear old video after fade
      setTimeout(() => {
        currV.pause();
        currV.src = "";
        currV.load();
      }, 300);

      active = active === 1 ? 2 : 1;
      index  = i;
      locked = false;

      preload();
    };
  }

  /* ══════════════════════
     PRELOAD NEXT VIDEO ONLY
  ══════════════════════ */
  function preload() {
    if (preEl) { preEl.src = ""; preEl.load(); preEl = null; }

    if (index + 1 < videos.length) {
      preEl          = document.createElement("video");
      preEl.src      = videos[index + 1];
      preEl.preload  = "auto";
      preEl.muted    = true;
      preEl.playsInline = true;
    }
  }

  /* ══════════════════════
     TAP TO PLAY
  ══════════════════════ */
  tap.onclick = () => {
    const v = active === 1 ? v1 : v2;
    v.muted = false;
    v.play().catch(() => {});
    tap.style.display = "none";
  };

  /* ══════════════════════
     SWIPE — all fixes applied
  ══════════════════════ */
  let startX  = 0;
  let startY  = 0;
  let swiped  = false; // FIX #3 — one swipe per gesture

  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiped = false;
  }, { passive: true });

  document.addEventListener("touchmove", e => {
    if (locked || swiped) return;

    const diffX = Math.abs(e.touches[0].clientX - startX);
    const diffY = startY - e.touches[0].clientY;

    // FIX #2 — only vertical swipe, prevent page scroll
    if (Math.abs(diffY) > 55 && diffX < 35) {
      e.preventDefault(); // FIX #2
      swiped = true;      // FIX #3

      if (diffY > 0) load(index + 1); // swipe up = next
      else           load(index - 1); // swipe down = prev
    }
  }, { passive: false }); // FIX #2 — must be false for preventDefault

  document.addEventListener("touchend", () => {
    swiped = false;
  }, { passive: true });

</script>
</body>
</html>
