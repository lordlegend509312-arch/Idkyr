<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
overflow:hidden;
}

.container{
height:100vh;
width:100%;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

video{
max-width:100%;
max-height:100%;
background:black;
}

.loader{
position:absolute;
color:white;
}

.nav-buttons{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="nav-buttons">
<button onclick="window.location.href='love.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>

const container = document.getElementById("container");

/* 🔥 SAME LIST (IMPORTANT) */
const videosList = [
"edit1.mp4",
"edit2.mp4",
"edit3.mp4"
];

let current = Math.floor(Math.random() * videosList.length);

/* RENDER */

function render(){

container.innerHTML = "<div class='loader'>Loading...</div>";

let video = document.createElement("video");
video.src = videosList[current];
video.autoplay = true;
video.loop = true;
video.playsInline = true;

video.onloadeddata = ()=>{
container.innerHTML = "";
container.appendChild(video);
video.play().catch(()=>{});
};

}

/* INIT */
render();

/* SWIPE */

let startY = 0;

document.addEventListener("touchstart",e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{

let diff = startY - e.changedTouches[0].clientY;

if(diff > 50 && current < videosList.length - 1){
current++;
render();
}
else if(diff < -50 && current > 0){
current--;
render();
}

});

</script>

</body>
</html>
