<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reels ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    touch-action: none;
  }

  #screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #screen video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  #spinner {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 46px; height: 46px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #ff4da6;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    z-index: 10;
    display: none;
  }
  #spinner.show { display: block; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  #tapPlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,77,166,0.92);
    color: #fff;
    padding: 13px 28px;
    border-radius: 30px;
    font-size: 15px;
    z-index: 20;
    display: none;
    cursor: pointer;
  }
  #tapPlay.show { display: block; }

  #navBtns {
    position: fixed;
    bottom: 24px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 22px;
    z-index: 20;
  }

  #navBtns button {
    padding: 11px 22px;
    border: none;
    border-radius: 22px;
    background: #ff4da6;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 18px rgba(255,77,166,0.35);
  }
  #navBtns button:active { opacity: 0.7; }
</style>
</head>
<body>

<div id="screen"></div>
<div id="spinner"></div>
<div id="tapPlay">▶ Tap to Play</div>

<div id="navBtns">
  <button onclick="window.location.href='love.html'">⬅ Previous</button>
  <button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>
  const screen  = document.getElementById("screen");
  const spinner = document.getElementById("spinner");
  const tapPlay = document.getElementById("tapPlay");

  let videos      = [];
  let current     = 0;
  let isBusy      = false;
  let activeVid   = null;
  let preloadNext = null;
  let preloadPrev = null;
  let busyTimer   = null;

  /* ══════════════════════════════════
     FIX #5 — RELIABLE DETECTION
     fetch HEAD — won't false-fire on
     slow networks like video onerror
  ══════════════════════════════════ */
  function detectVideos(index, done) {
    fetch(`edit${index}.mp4`, { method: "HEAD" })
      .then(res => {
        if (res.ok) {
          videos.push(`edit${index}.mp4`);
          detectVideos(index + 1, done);
        } else {
          done();
        }
      })
      .catch(() => done());
  }

  /* ══════════════════════════════════
     FIX #4 — SAFE BUSY LOCK
     Auto-unlocks after 8s so page
     never freezes permanently
  ══════════════════════════════════ */
  function setBusy(val) {
    isBusy = val;
    clearTimeout(busyTimer);
    if (val) {
      busyTimer = setTimeout(() => {
        isBusy = false;
        spinner.classList.remove("show");
      }, 8000);
    }
  }

  /* ══════════════════════════════════
     LOAD & PLAY ONE VIDEO
  ══════════════════════════════════ */
  function loadVideo(index) {
    if (index < 0 || index >= videos.length || isBusy) return;

    setBusy(true);
    tapPlay.classList.remove("show");
    spinner.classList.add("show");

    // Fully destroy active video
    if (activeVid) {
      activeVid.pause();
      activeVid.oncanplay = null;
      activeVid.src = "";
      activeVid.load();
      activeVid.remove();
      activeVid = null;
    }

    // FIX #2 — save old current BEFORE changing it
    const prevCurrent = current;
    current = index; // update FIRST, then check direction

    // FIX #1 & #2 — direction check now correct
    let vid = null;
    if (index > prevCurrent && preloadNext && preloadNext._index === index) {
      vid = preloadNext;
      preloadNext = null;
    } else if (index < prevCurrent && preloadPrev && preloadPrev._index === index) {
      vid = preloadPrev;
      preloadPrev = null;
    }

    // Free unused preloads
    if (preloadNext) { preloadNext.oncanplay = null; preloadNext.src = ""; preloadNext.load(); preloadNext = null; }
    if (preloadPrev) { preloadPrev.oncanplay = null; preloadPrev.src = ""; preloadPrev.load(); preloadPrev = null; }

    // FIX #3 — if preloaded video src is empty/stale, make fresh one
    if (!vid || !vid.src || vid.src === "" || vid.src === window.location.href) {
      vid = document.createElement("video");
      vid.src     = videos[index];
      vid.preload = "auto";
    }

    vid.loop        = true;
    vid.muted       = false;
    vid.playsInline = true;
    vid._index      = index;

    screen.appendChild(vid);
    activeVid = vid;

    const onReady = () => {
      spinner.classList.remove("show");
      setBusy(false);
      vid.play().catch(() => tapPlay.classList.add("show"));
      schedulePreload();
    };

    if (vid.readyState >= 3) {
      onReady();
    } else {
      vid.oncanplay = () => {
        vid.oncanplay = null;
        onReady();
      };
    }
  }

  /* ══════════════════════════════════
     PRELOAD NEXT + PREV ONLY
  ══════════════════════════════════ */
  function schedulePreload() {
    // Next
    if (current + 1 < videos.length) {
      if (!preloadNext || preloadNext._index !== current + 1) {
        if (preloadNext) { preloadNext.src = ""; preloadNext.load(); }
        const pn       = document.createElement("video");
        pn.src         = videos[current + 1];
        pn.preload     = "auto";
        pn.muted       = true;
        pn.playsInline = true;
        pn._index      = current + 1;
        preloadNext    = pn;
      }
    } else {
      if (preloadNext) { preloadNext.src = ""; preloadNext.load(); preloadNext = null; }
    }

    // Prev
    if (current - 1 >= 0) {
      if (!preloadPrev || preloadPrev._index !== current - 1) {
        if (preloadPrev) { preloadPrev.src = ""; preloadPrev.load(); }
        const pp       = document.createElement("video");
        pp.src         = videos[current - 1];
        pp.preload     = "auto";
        pp.muted       = true;
        pp.playsInline = true;
        pp._index      = current - 1;
        preloadPrev    = pp;
      }
    } else {
      if (preloadPrev) { preloadPrev.src = ""; preloadPrev.load(); preloadPrev = null; }
    }
  }

  /* ══════════════════════════════════
     TAP TO PLAY
  ══════════════════════════════════ */
  tapPlay.addEventListener("click", () => {
    if (activeVid) activeVid.play().catch(() => {});
    tapPlay.classList.remove("show");
  });

  /* ══════════════════════════════════
     SWIPE UP / DOWN
  ══════════════════════════════════ */
  let startY = 0;
  let swiped = false;

  document.addEventListener("touchstart", e => {
    if (isBusy) return;
    startY = e.touches[0].clientY;
    swiped = false;
  }, { passive: true });

  document.addEventListener("touchmove", e => {
    if (isBusy || swiped) return;
    const diff = startY - e.touches[0].clientY;
    if (Math.abs(diff) > 50) {
      swiped = true;
      if (diff > 0 && current < videos.length - 1) {
        loadVideo(current + 1);
      } else if (diff < 0 && current > 0) {
        loadVideo(current - 1);
      } else {
        setBusy(false); // first or last video edge case
      }
    }
  }, { passive: true });

  document.addEventListener("touchend", () => {
    swiped = false;
  }, { passive: true });

  /* ══════════════════════════════════
     START
  ══════════════════════════════════ */
  detectVideos(1, () => {
    if (videos.length === 0) {
      screen.innerHTML = "<p style='color:white;padding:30px;font-size:16px'>Koi video nahi mili 😢</p>";
      return;
    }
    loadVideo(0);
  });
</script>
</body>
</html>
