<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
overflow:hidden;
}

/* container */

.container{
height:100vh;
width:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
position:relative;
}

/* 🔥 NO ZOOM FIX */

video{
max-width:100%;
max-height:100%;
object-fit:contain;
background:black;
position:absolute;
}

/* buttons */

.nav-buttons{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:10;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="nav-buttons">
<button onclick="window.location.href='love.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>

const container = document.getElementById("container");

let videos = [];
let current = 0;

/* 🔥 AUTO DETECT VIDEOS */

let i = 1;

function detect(){

let v = document.createElement("video");
v.src = `edit${i}.mp4`;

v.onloadeddata = ()=>{
videos.push(`edit${i}.mp4`);
i++;
detect();
};

v.onerror = ()=>{
start();
};

}

detect();

/* START */

function start(){

if(videos.length === 0){
container.innerHTML = "<p style='color:white'>No videos found</p>";
return;
}

current = Math.floor(Math.random() * videos.length);

loadVideos();

}

/* 🔥 CORE SYSTEM */

let currentVideo, nextVideo;

function loadVideos(){

container.innerHTML = "";

/* CURRENT */
currentVideo = document.createElement("video");
currentVideo.src = videos[current];
currentVideo.autoplay = true;
currentVideo.loop = true;
currentVideo.playsInline = true;

/* NEXT PRELOAD */
if(current < videos.length - 1){
nextVideo = document.createElement("video");
nextVideo.src = videos[current + 1];
nextVideo.preload = "auto";
nextVideo.muted = true;
}

/* SHOW CURRENT */
container.appendChild(currentVideo);

currentVideo.onloadeddata = ()=>{
currentVideo.play().catch(()=>{});
};

}

/* SWIPE */

let startY = 0;

document.addEventListener("touchstart", e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{

let diff = startY - e.changedTouches[0].clientY;

/* NEXT */
if(diff > 50 && current < videos.length - 1){

current++;

/* instant switch */
container.innerHTML = "";
container.appendChild(nextVideo);

currentVideo = nextVideo;

/* preload next-next */
if(current < videos.length - 1){
nextVideo = document.createElement("video");
nextVideo.src = videos[current + 1];
nextVideo.preload = "auto";
nextVideo.muted = true;
}

currentVideo.play().catch(()=>{});

}

/* PREVIOUS */
else if(diff < -50 && current > 0){

current--;
loadVideos();

}

});

</script>

</body>
</html>
