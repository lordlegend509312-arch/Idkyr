<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
overflow:hidden;
font-family:sans-serif;
}

.container{
height:100vh;
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

video{
max-width:100%;
max-height:100%;
background:black;
}

.swipe-hint{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
color:white;
animation:updown 1s infinite;
}

@keyframes updown{
0%{transform:translate(-50%,10px);opacity:0;}
50%{opacity:1;}
100%{transform:translate(-50%,-10px);opacity:0;}
}

.tap{
position:absolute;
bottom:50%;
left:50%;
transform:translate(-50%,50%);
color:white;
}

.nav-buttons{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="swipe-hint" id="hint">⬆ Swipe</div>
<div class="tap" id="tap">Tap for sound 🔊</div>

<div class="nav-buttons">
<button onclick="window.location.href='love.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>

const container = document.getElementById("container");
const hint = document.getElementById("hint");
const tap = document.getElementById("tap");

/* 🔥 ONLY REAL FILES PUT HERE */
const videosList = [
"edit1.mp4",
"edit2.mp4",
"edit3.mp4",
"edit4.mp4",
"edit5.mp4",
"edit6.mp4"
]; // 👈 जितनी हैं उतनी ही डाल

let current = Math.floor(Math.random() * videosList.length);

let sound = false;
let swiped = false;

/* RENDER */

function render(){

container.innerHTML = "";

let video = document.createElement("video");
video.src = videosList[current];
video.loop = true;
video.playsInline = true;
video.muted = !sound;
video.autoplay = true;

container.appendChild(video);

video.play().catch(()=>{});

}

/* INIT */
render();

/* SOUND */

document.addEventListener("click", ()=>{
if(!sound){
sound = true;
tap.style.display="none";
render();
}
});

/* SWIPE */

let startY=0;

document.addEventListener("touchstart",e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{

let diff = startY - e.changedTouches[0].clientY;

if(diff > 50 && current < videosList.length - 1){
current++;
}
else if(diff < -50 && current > 0){
current--;
}else{
return;
}

/* hide hint */
if(!swiped){
swiped = true;
hint.style.display="none";
}

render();

});

</script>

</body>
</html>
