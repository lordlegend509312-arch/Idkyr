<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Reels ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
}

.container{
height:100vh;
width:100%;
position:relative;
overflow:hidden;
}

.reel{
position:absolute;
height:100%;
width:100%;
display:flex;
justify-content:center;
align-items:center;
transition:transform 0.4s ease;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.nav-buttons{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:10;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="nav-buttons">
<button onclick="window.location.href='yesorno.html'">⬅ Previous</button>
<button onclick="window.location.href='love2.html'">Next ➜</button>
</div>

<script>

const container = document.getElementById("container");

let reels = [];
let videos = [];
let current = 0;

/* 🔥 1–10 auto check */

for(let i=1;i<=10;i++){

let video = document.createElement("video");
video.src = `edit${i}.mp4`;
video.muted = true;
video.loop = true;

/* check if file exists */

video.onloadeddata = ()=>{

let div = document.createElement("div");
div.className = "reel";

div.appendChild(video);
container.appendChild(div);

reels = document.querySelectorAll(".reel");
videos = document.querySelectorAll("video");

update();
play();
};

/* अगर file नहीं है → ignore */

video.onerror = ()=>{
// kuch nahi karna
};

}

/* position */

function update(){
reels.forEach((r,i)=>{
r.style.transform = `translateY(${(i - current) * 100}%)`;
});
}

/* play only visible */

function play(){
videos.forEach((v,i)=>{
if(i === current){
v.play();
}else{
v.pause();
}
});
}

/* swipe */

let startY = 0;

document.addEventListener("touchstart", e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
let endY = e.changedTouches[0].clientY;
let diff = startY - endY;

if(diff > 50 && current < reels.length - 1){
current++;
}
else if(diff < -50 && current > 0){
current--;
}

update();
play();
});

</script>

</body>
</html>
