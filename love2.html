<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Reels ❤️</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
background:black;
}

.container{
height:100vh;
width:100%;
position:relative;
overflow:hidden;
}

.reel{
position:absolute;
height:100%;
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

video{
width:100%;
height:100%;
object-fit:contain; /* 🔥 no zoom */
background:black;
}

/* buttons */

.nav-buttons{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:10;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
}

/* tap hint */

.tap{
position:absolute;
color:white;
bottom:50%;
left:50%;
transform:translate(-50%,50%);
font-size:18px;
opacity:0.8;
z-index:20;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="tap" id="tap">Tap for sound 🔊</div>

<div class="nav-buttons">
<button onclick="window.location.href='love.html'">⬅ Previous</button>
<button onclick="window.location.href='love3.html'">Next ➜</button>
</div>

<script>

const container = document.getElementById("container");
const tapText = document.getElementById("tap");

let reels = [];
let videos = [];
let current = 0;
let soundEnabled = false;

/* 🔥 CREATE REELS */

for(let i=1;i<=10;i++){

let div = document.createElement("div");
div.className = "reel";

let video = document.createElement("video");
video.src = `edit${i}.mp4`;
video.loop = true;
video.playsInline = true;
video.muted = true; // start muted

div.appendChild(video);
container.appendChild(div);
}

reels = document.querySelectorAll(".reel");
videos = document.querySelectorAll("video");

/* 🔥 RANDOM FIRST REEL */

current = Math.floor(Math.random() * reels.length);

/* POSITION */

function update(animate = true){
reels.forEach((r,i)=>{
r.style.transition = animate ? "transform 0.4s ease" : "none";
r.style.transform = `translateY(${(i - current) * 100}%)`;
});
}

/* PLAY */

function play(){
videos.forEach((v,i)=>{
if(i === current){
v.play();
}else{
v.pause();
}
});
}

/* FIRST LOAD */
update(false);
play();

/* 🔊 ENABLE SOUND ON TAP */

document.addEventListener("click", ()=>{

if(!soundEnabled){
videos.forEach(v=>{
v.muted = false;
});
soundEnabled = true;
tapText.style.display = "none";
play();
}

});

/* SWIPE */

let startY = 0;

document.addEventListener("touchstart", e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
let endY = e.changedTouches[0].clientY;
let diff = startY - endY;

if(diff > 50 && current < reels.length - 1){
current++;
}
else if(diff < -50 && current > 0){
current--;
}

update(true);
play();
});

</script>

</body>
</html>
