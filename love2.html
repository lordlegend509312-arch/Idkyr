<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  background:#000;
  height:100%;
  width:100%;
  overflow:hidden;
}

/* Slots */
.slot{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity .25s ease;
}
.slot.active{
  opacity:1;
  z-index:2;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* Spinner */
#spinner{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:45px;height:45px;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:#ff4da6;
  border-radius:50%;
  animation:spin .8s linear infinite;
  display:none;
  z-index:10;
}
#spinner.show{display:block;}

@keyframes spin{
  to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* Tap */
#tap{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#ff4da6;
  color:#fff;
  padding:12px 26px;
  border-radius:25px;
  display:none;
  z-index:20;
}

/* Buttons */
#nav{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  z-index:20;
}
#nav button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4da6;
  color:#fff;
}

/* Hint */
#hint{
  position:fixed;
  bottom:80px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:13px;
  opacity:.8;
}
.hide{opacity:0;transition:.4s;}
</style>
</head>

<body>

<div id="slot1" class="slot active"><video id="v1" playsinline loop muted></video></div>
<div id="slot2" class="slot"><video id="v2" playsinline loop muted></video></div>

<div id="spinner"></div>
<div id="tap">Tap to Play</div>
<div id="hint">Swipe Up</div>

<div id="nav">
  <button id="prev">⬅ Previous</button>
  <button id="next">Next ➜</button>
</div>

<script>
const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");
const slot1 = document.getElementById("slot1");
const slot2 = document.getElementById("slot2");

const spinner = document.getElementById("spinner");
const tap = document.getElementById("tap");
const hint = document.getElementById("hint");

const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

let videos = [];
let index = 0;
let active = 1;
let locked = false;

/* Detect */
function detect(i){
  const t = document.createElement("video");
  t.src = `edit${i}.mp4`;
  t.onloadedmetadata = ()=>{ videos.push(`edit${i}.mp4`); detect(i+1); };
  t.onerror = start;
}
detect(1);

/* Load */
function load(i){
  if(i<0 || i>=videos.length || locked) return;
  locked = true;

  hint.classList.add("hide");

  const nextV = active===1 ? v2 : v1;
  const currV = active===1 ? v1 : v2;
  const nextSlot = active===1 ? slot2 : slot1;
  const currSlot = active===1 ? slot1 : slot2;

  spinner.classList.add("show");

  nextV.src = videos[i];
  nextV.load();

  nextV.oncanplaythrough = ()=>{
    spinner.classList.remove("show");

    nextV.play().catch(()=> tap.style.display="block");

    nextSlot.classList.add("active");
    currSlot.classList.remove("active");

    setTimeout(()=>{
      currV.pause();
      currV.removeAttribute("src");
      currV.load();
    },300);

    active = active===1?2:1;
    index = i;
    locked = false;

    preload();
  };
}

/* Preload */
let pre=null;
function preload(){
  if(pre){ pre.remove(); pre=null; }
  if(index+1 < videos.length){
    pre = document.createElement("video");
    pre.src = videos[index+1];
    pre.preload="auto";
  }
}

/* Start */
function start(){
  if(!videos.length){
    document.body.innerHTML="<p style='color:white'>No videos</p>";
    return;
  }

  spinner.classList.add("show");

  v1.src = videos[0];
  v1.oncanplaythrough = ()=>{
    spinner.classList.remove("show");
    v1.play().catch(()=> tap.style.display="block");
    preload();
  };
}

/* Tap */
tap.onclick = ()=>{
  const v = active===1 ? v1 : v2;
  v.muted=false;
  v.play();
  tap.style.display="none";
};

/* Swipe (FIXED) */
let startY=0;

document.addEventListener("touchstart",e=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchmove",e=>{
  if(locked) return;

  let diff = startY - e.touches[0].clientY;

  if(Math.abs(diff) > 60){
    if(diff>0) load(index+1);
    else load(index-1);
  }
});

/* Buttons */
nextBtn.onclick = ()=> load(index+1);
prevBtn.onclick = ()=> load(index-1);

</script>

</body>
</html>
