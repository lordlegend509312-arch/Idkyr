<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

html, body {
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:'Dancing Script',cursive;
text-align:center;
background:linear-gradient(-45deg,#ff9acb,#ffcce6,#ff66b2,#ffb3d9);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(18px);
padding:30px;
border-radius:30px;
box-shadow:0 20px 50px rgba(255,0,102,0.35);
animation:fadeIn 1.2s ease;
position:relative;
z-index:2;
max-width:90%;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

img{
display:block;
margin:auto;
max-width:100%;
}

h1{
font-family:'Great Vibes',cursive;
font-size:40px;
color:#ff0066;
text-shadow:0 0 12px rgba(255,0,120,0.4);
margin-top:20px;
}

.buttons{margin-top:20px;}

button{
padding:15px 25px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yesBtn{
background:linear-gradient(45deg,#ff4da6,#ff0066);
color:white;
}

#yesBtn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff1a75;
}

#noBtn{
background:linear-gradient(45deg,#ff9999,#ff4d4d);
color:white;
}

.next-wrapper{
display:none;
margin-top:25px;
text-align:right;
}

#nextBtn{
padding:10px 22px;
border:none;
border-radius:20px;
background:#ff0066;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 12px rgba(255,0,102,0.6);
}

.star{
position:fixed;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
z-index:0;
}

@keyframes twinkle{
from{opacity:.3;transform:scale(.6);}
to{opacity:1;transform:scale(1.5);}
}

.heart{
position:fixed;
font-size:20px;
animation:floatUp 7s linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0);opacity:1;}
to{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<img id="bearImg" src="main.gif">

<h1 id="mainText">Will you be my valentine? 💖</h1>

<div class="buttons">
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>
</div>

<div class="next-wrapper" id="nextWrapper">
<button id="nextBtn">Next ➜</button>
</div>

</div>

<script>

/* STARS */

setInterval(()=>{
const star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(star);
setTimeout(()=>star.remove(),2000);
},600);

/* HEARTS */

setInterval(()=>{
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.bottom="-20px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},2000);

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const nextBtn=document.getElementById("nextBtn");
const nextWrapper=document.getElementById("nextWrapper");
const mainText=document.getElementById("mainText");

let yesSize=20;
let noScale=1;
let noIndex=0;

let noTexts=[
"Please 🥺","Oh","Hm","Okay ☺️","Sweetuuu pleaseeee ☹️","Please please please 😥",
"Meri cutuuu maanjao 😚","Dil tut rhaa hai..🥺☹️🥺","Prettyyy pleaseee..","Brown rasmalai plss 😡",
"Neet wali madam<br>kya hai huhh","Meri jaan 😚","Shonuu babyy maanjao na 🥳","Okay ab bohot hora h",
"Marr jauga","Marr gya"
];

/* NO BUTTON */

noBtn.addEventListener("click",function(){

if(noIndex<noTexts.length-1)noIndex++;

this.innerHTML=noTexts[noIndex];

yesSize+=12;
yesBtn.style.fontSize=yesSize+"px";
yesBtn.style.padding=(yesSize/2)+"px "+yesSize+"px";

if(noScale>.25){
noScale-=.08;
noBtn.style.transform="scale("+noScale+")";
}

});

/* YES BUTTON */

yesBtn.addEventListener("click",function(){

mainText.innerText="Happiiii happiiiiiii happpiiiiiiiiiii 🥳🥳🥳🥳😋🙈🙈🙈💋💋💋💓❤️🧡💛💚💙💜🤎💋❤️‍🩹♥️💌💕💘💝💖😍🤩🥰😘😚";

document.getElementById("bearImg").src="main2.gif";

document.querySelector(".buttons").style.display="none";

nextWrapper.style.display="block";

for(let i=0;i<30;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.bottom="0px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

}

});

nextBtn.addEventListener("click",function(){
window.location.href="love.html";
});

</script>

</body>
</html>
