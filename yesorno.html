<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:'Dancing Script',cursive;
text-align:center;
user-select:none;

background-image:url("wallpaper1.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* GIF */

#bearImg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* TEXT */

h1{
position:absolute;
top:8%;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes',cursive;
font-size:36px;
color:#ff0066;
text-shadow:0 0 15px rgba(255,0,128,0.5);
max-width:90%;
line-height:1.4;
z-index:2;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:10%;
left:50%;
transform:translateX(-50%);
z-index:2;
}

button{
padding:15px 25px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yesBtn{
background:linear-gradient(45deg,#ff4da6,#ff0066);
color:white;
}

#yesBtn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff1a75;
}

#noBtn{
background:linear-gradient(45deg,#ff9999,#ff4d4d);
color:white;
}

/* NEXT BUTTON */

#nextWrapper{
display:none;
position:absolute;
bottom:6%;
left:50%;
transform:translateX(-50%);
z-index:2;
}

#nextBtn{
padding:12px 25px;
border:none;
border-radius:20px;
background:#ff0066;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px rgba(255,0,102,0.6);
}

/* STARS */

.star{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
z-index:0;
}

@keyframes twinkle{
from{opacity:0.3;transform:scale(0.5);}
to{opacity:1;transform:scale(1.6);}
}

/* HEARTS */

.heart{
position:fixed;
font-size:18px;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0);opacity:1;}
to{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<img id="bearImg" src="main.gif">

<h1 id="mainText">Will you be my valentine? 💖</h1>

<div class="buttons">
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>
</div>

<div id="nextWrapper">
<button id="nextBtn">Next ➜</button>
</div>

</div>

<script>

/* STARS */

setInterval(()=>{
const star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(star);
setTimeout(()=>star.remove(),2000);
},300);

/* FLOATING HEARTS */

setInterval(()=>{
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.bottom="-20px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},1500);

/* BUTTON LOGIC */

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const nextBtn=document.getElementById("nextBtn");
const nextWrapper=document.getElementById("nextWrapper");
const mainText=document.getElementById("mainText");

let yesSize=20;
let noScale=1;
let noIndex=0;

const noTexts=[
"Please 🥺","Oh","Hm","Okay ☺️","Sweetuuu pleaseeee ☹️",
"Please please please 😥","Meri cutuuu maanjao 😚",
"Dil tut rhaa hai..🥺☹️🥺","Prettyyy pleaseee..",
"Brown rasmalai plss 😡","Neet wali madam kya hai huhh",
"Meri jaan 😚","Shonuu babyy maanjao na 🥳",
"Okay ab bohot hora h","Marr jauga","Marr gya"
];

noBtn.addEventListener("click",()=>{

if(noIndex<noTexts.length-1)noIndex++;

noBtn.innerText=noTexts[noIndex];

yesSize+=12;

yesBtn.style.fontSize=yesSize+"px";
yesBtn.style.padding=(yesSize/2)+"px "+yesSize+"px";

if(noScale>0.25){
noScale-=0.08;
noBtn.style.transform=`scale(${noScale})`;
}

});

/* YES CLICK */

yesBtn.addEventListener("click",()=>{

mainText.innerHTML="Happiiii happiiiiiii happpiiiiiiiiiii 🥳🥳🥳🥳<br>😋🙈🙈🙈💋💋💋💓❤️🧡💛💚💙💜🤎<br>💋❤️‍🩹♥️💌💕💘💝💖<br>😍🤩🥰😘😚";

document.getElementById("bearImg").src="main2.gif";

document.querySelector(".buttons").style.display="none";

nextWrapper.style.display="block";

document.documentElement.style.overflow="auto";
document.body.style.overflow="auto";

for(let i=0;i<25;i++){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.bottom="0px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

}

});

/* NEXT PAGE */

nextBtn.addEventListener("click",()=>{
window.location.href="love.html";
});

</script>

</body>
</html>
